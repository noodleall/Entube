<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Entube - 업로드</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #0f0f0f; color: white; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .box { background: #212121; padding: 40px; border-radius: 12px; width: 100%; max-width: 500px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #121212; border: 1px solid #444; color: white; }
        button { width: 100%; padding: 15px; background: #ff0000; border: none; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #preview { width: 100%; margin: 20px 0; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🎬 영상 업로드</h2>
        <input type="text" id="title" placeholder="영상 제목을 입력하세요">
        <input type="file" id="file" accept="video/*">
        <video id="preview" controls></video>
        <button id="upBtn">업로드 시작</button>
        <p id="st">파일을 선택해주세요.</p>
        <a href="index.html" style="color:#aaa; text-decoration:none; font-size:14px;">← 돌아가기</a>
    </div>

    <script>
        const supabaseUrl = 'https://kzchubdwrkcpmuempgrg.supabase.co';
        const supabaseKey = 'sb_publishable_MyFF5Xln3fWLvTqMx2CFNA_obZtoask'; 
        const _client = window.supabase.createClient(supabaseUrl, supabaseKey);

        const fileIn = document.getElementById('file');
        const pre = document.getElementById('preview');
        const btn = document.getElementById('upBtn');
        const st = document.getElementById('st');

        fileIn.onchange = (e) => {
            const file = e.target.files[0];
            if(file) { pre.src = URL.createObjectURL(file); pre.style.display = 'block'; st.innerText = "준비 완료!"; }
        };

        btn.onclick = async () => {
            const { data: { session } } = await _client.auth.getSession();
            if(!session) return alert("로그인 필요!");
            
            const file = fileIn.files[0];
            const title = document.getElementById('title').value;
            if(!file || !title) return alert("제목과 파일을 확인하세요!");

            btn.disabled = true; st.innerText = "⏳ 업로드 중...";
            
            const fileName = `${Date.now()}_${file.name}`;
            const { error: sErr } = await _client.storage.from('videos').upload(fileName, file);
            if(sErr) { alert(sErr.message); btn.disabled = false; return; }

            const { data: { publicUrl } } = _client.storage.from('videos').getPublicUrl(fileName);
            await _client.from('posts').insert([{ title, video_url: publicUrl, author_id: session.user.id }]);

            st.innerText = "✅ 성공! 잠시 후 이동합니다.";
            setTimeout(() => location.href = 'index.html', 2000);
        };
    </script>
</body>
</html>
