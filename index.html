<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Entube - 메인</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #0f0f0f; --text-color: #f1f1f1; --accent: #ff0000; --card-bg: #212121; }
        body { font-family: 'Arial', sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 30px; background: var(--bg-color); border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: bold; cursor: pointer; color: white; }
        .logo span { color: var(--accent); }
        .user-chip { display: flex; align-items: center; gap: 10px; background: #333; padding: 5px 15px; border-radius: 20px; cursor: pointer; }
        .user-chip img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .video-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; }
        .video-card video { width: 100%; aspect-ratio: 16/9; background: #000; }
        .v-info { padding: 15px; display: flex; gap: 12px; }
        .v-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #444; }
        .v-text p { margin: 0; font-weight: bold; }
        .v-text span { font-size: 13px; color: #aaa; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="location.reload()">▶ <span>Entube</span></div>
        <div id="authSection">
            <button onclick="handleLogin()" style="background:white; color:black; padding:8px 16px; border-radius:20px; border:none; font-weight:bold; cursor:pointer;">로그인 / 가입</button>
        </div>
    </nav>

    <div class="video-grid" id="videoGrid">
        <p style="padding:20px;">데이터를 연결하는 중입니다...</p>
    </div>

    <script>
        // 🚨 빤쭌아, 이 주소랑 키가 내 수퍼베이스 대시보드랑 똑같은지 한 번만 더 봐줘!
        const supabaseUrl = 'https://kzchubdwrkcpmuempgrg.supabase.co';
        const supabaseKey = 'sb_publishable_MyFF5Xln3fWLvTqMx2CFNA_obZtoask'; 
        const _client = window.supabase.createClient(supabaseUrl, supabaseKey);

        let myProfile = null;

        // 에러가 나도 화면이 멈추지 않게 감싸줌
        async function init() {
            try {
                const { data: { session } } = await _client.auth.getSession();
                if (session) {
                    const { data } = await _client.from('profiles').select('*').eq('id', session.user.id).single();
                    myProfile = data;
                }
                updateUI();
                loadVideos();
            } catch (err) {
                console.error("초기화 에러:", err);
                updateUI(); // 에러 나도 로그인 버튼은 보여줌
            }
        }

        function updateUI() {
            const area = document.getElementById('authSection');
            if (myProfile) {
                area.innerHTML = `
                    <div style="display:flex; gap:10px; align-items:center;">
                        <button onclick="location.href='upload.html'" style="background:red; color:white; border:none; padding:8px 15px; border-radius:15px; cursor:pointer;">+ 업로드</button>
                        <div class="user-chip">
                            <img src="${myProfile.avatar_url || ''}">
                            <span>${myProfile.nickname || '익명'}</span>
                        </div>
                        <button onclick="logout()" style="background:none; border:none; color:#aaa; cursor:pointer;">로그아웃</button>
                    </div>`;
            }
        }

        async function logout() { await _client.auth.signOut(); location.reload(); }

        async function handleLogin() {
            const email = prompt("이메일:");
            const pw = prompt("비밀번호(6자이상):");
            if (email && pw) {
                const { error } = await _client.auth.signInWithPassword({ email, password: pw });
                if (error) await _client.auth.signUp({ email, password: pw });
                location.reload();
            }
        }

        async function loadVideos() {
            const grid = document.getElementById('videoGrid');
            try {
                // ⚠️ 여기서 에러가 많이 남 (테이블 연결 문제)
                const { data: videos, error } = await _client.from('posts').select('*, profiles(nickname, avatar_url)');
                
                if (error) throw error;

                grid.innerHTML = '';
                if (!videos || videos.length === 0) {
                    grid.innerHTML = '<p>아직 영상이 없습니다. 첫 영상을 올려보세요!</p>';
                    return;
                }

                videos.forEach(v => {
                    const nick = v.profiles?.nickname || '유튜버';
                    const pfp = v.profiles?.avatar_url || '';
                    const div = document.createElement('div');
                    div.className = 'video-card';
                    div.innerHTML = `
                        <video src="${v.video_url}" controls></video>
                        <div class="v-info">
                            <img src="${pfp}" class="v-avatar">
                            <div class="v-text"><p>${v.title}</p><span>${nick}</span></div>
                        </div>`;
                    grid.appendChild(div);
                });
            } catch (err) {
                console.error("영상 로드 에러:", err);
                grid.innerHTML = `<p style="color:red;">영상을 불러오지 못했습니다. (SQL 에러일 확률 99%)</p>`;
            }
        }

        init();
    </script>
</body>
</html>
