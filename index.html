<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entube - 프리미엄</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 모던 라이트 테마 설정 */
        :root { 
            --bg-base: #f8f9fa; --bg-surface: #ffffff; --bg-hover: #e9ecef; 
            --text-primary: #212529; --text-secondary: #6c757d; 
            --brand-color: #3b82f6; --divider: #dee2e6; --danger: #ef4444;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-base); color: var(--text-primary); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow-x: hidden; }
        * { box-sizing: border-box; }
        button { cursor: pointer; transition: all 0.2s ease; }
        
        /* 헤더 & 네비게이션 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 24px; height: 64px; background: var(--bg-surface); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--divider); }
        .logo { font-size: 22px; font-weight: 800; color: var(--text-primary); cursor: pointer; }
        .logo span { color: var(--brand-color); }
        .search-box { display: flex; width: 500px; background: var(--bg-base); border: 1px solid var(--divider); border-radius: 8px; overflow: hidden; }
        .search-box input { flex: 1; padding: 12px 16px; background: transparent; border: none; color: var(--text-primary); outline: none; }
        .search-box button { padding: 10px 20px; background: var(--bg-surface); border: none; border-left: 1px solid var(--divider); font-weight: 600; }
        .header-right { display: flex; gap: 16px; align-items: center; }
        .btn-auth { background: var(--brand-color); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; }
        .btn-upload { background: var(--bg-surface); border: 1px solid var(--divider); padding: 10px 16px; border-radius: 8px; font-weight: 600; }
        .profile-img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 1px solid var(--divider); }

        /* 메인 레이아웃 */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 240px; padding: 20px 16px; background: var(--bg-surface); border-right: 1px solid var(--divider); }
        .sidebar-item { padding: 12px 16px; font-weight: 600; cursor: pointer; border-radius: 8px; margin-bottom: 8px; }
        .sidebar-item.active { background: #eff6ff; color: var(--brand-color); }
        .sidebar-item:hover:not(.active) { background: var(--bg-hover); }
        .content-area { flex: 1; overflow-y: auto; }
        
        /* 영상 그리드 */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; padding: 32px; }
        .video-card { display: flex; flex-direction: column; gap: 14px; cursor: pointer; }
        .thumbnail { width: 100%; aspect-ratio: 16/9; border-radius: 12px; background: #e9ecef; object-fit: cover; }
        .details { display: flex; gap: 14px; }
        .details-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--divider); object-fit: cover; }
        .meta h3 { margin: 0 0 6px 0; font-size: 16px; font-weight: 700; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .meta p { margin: 0; font-size: 13px; color: var(--text-secondary); }
        
        @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: calc(200px + 100%) 0; } }
        .skeleton { background: linear-gradient(90deg, #e9ecef 25%, #f8f9fa 50%, #e9ecef 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }

        /* 모달 & 입력 폼 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000; }
        .modal-card { background: var(--bg-surface); padding: 40px; border-radius: 16px; width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .modal-card h2 { margin: 0 0 8px 0; font-size: 22px; font-weight: 800; }
        .input-group { margin-bottom: 16px; }
        .input-group input { width: 100%; padding: 14px; border: 1px solid var(--divider); border-radius: 8px; font-size: 14px; }
        .input-group input:focus { border-color: var(--brand-color); outline: none; }
        .btn-primary { width: 100%; padding: 14px; background: var(--brand-color); color: white; border: none; border-radius: 8px; font-weight: 700; margin-top: 10px; }
        .btn-toggle { width: 100%; padding: 14px; background: transparent; border: none; color: var(--text-secondary); font-weight: 600; margin-top: 8px; text-decoration: underline; }

        /* 토스트 알림 */
        .toast-container { position: fixed; bottom: 32px; right: 32px; z-index: 3000; display: flex; flex-direction: column; gap: 12px; }
        .toast { background: var(--text-primary); color: white; padding: 16px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; opacity: 0; transform: translateY(20px); transition: all 0.3s; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: var(--danger); }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <header class="header">
        <div class="logo" onclick="location.reload()">Entube<span>.</span></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="영상 검색..." onkeypress="if(event.key==='Enter') searchVideos()">
            <button onclick="searchVideos()">검색</button>
        </div>
        <div class="header-right" id="authSection"></div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-item active" onclick="location.reload()">홈</div>
            <div class="sidebar-item">탐색</div>
            <div class="sidebar-item">구독</div>
        </aside>
        <main class="content-area">
            <div class="video-grid" id="videoGrid"></div>
        </main>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="modal-card">
            <h2 id="modalTitle">로그인</h2>
            <p id="modalDesc" style="color:var(--text-secondary); font-size:14px; margin-bottom:24px;">아이디와 비밀번호를 입력하세요.</p>
            
            <div class="input-group">
                <input type="text" id="authId" placeholder="아이디 (영문/숫자)">
            </div>
            <div class="input-group">
                <input type="password" id="authPw" placeholder="비밀번호 (6자 이상)">
            </div>
            <div class="input-group" id="nickGroup" style="display: none;">
                <input type="text" id="authNick" placeholder="사용할 닉네임 (예: 슈퍼유튜버)">
            </div>

            <button class="btn-primary" id="authSubmitBtn" onclick="executeAuth()">로그인</button>
            <button class="btn-toggle" id="authToggleBtn" onclick="toggleAuthMode()">계정이 없나요? 회원가입</button>
            <button class="btn-toggle" style="text-decoration:none; color:#adb5bd;" onclick="closeModal('authModal')">닫기</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://kzchubdwrkcpmuempgrg.supabase.co';
        const supabaseKey = 'sb_publishable_MyFF5Xln3fWLvTqMx2CFNA_obZtoask'; 
        const _client = window.supabase.createClient(supabaseUrl, supabaseKey);

        let myProfile = null;
        let isSignupMode = false; // 현재 로그인 모드인지 가입 모드인지 기억하는 변수
        const defaultPfp = 'https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png';

        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        function showToast(message, isError = false) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        _client.auth.onAuthStateChange(async (_event, session) => {
            if (session) {
                const { data } = await _client.from('profiles').select('*').eq('id', session.user.id).single();
                myProfile = data || { id: session.user.id, nickname: '익명', avatar_url: defaultPfp };
            } else { myProfile = null; }
            renderHeader(); loadVideos();
        });

        function renderHeader() {
            const area = document.getElementById('authSection');
            if (myProfile) {
                area.innerHTML = `
                    <button class="btn-upload" onclick="location.href='upload.html'">업로드</button>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${myProfile.avatar_url || defaultPfp}" class="profile-img">
                        <span style="font-weight:600; font-size:14px;">${escapeHTML(myProfile.nickname)}</span>
                        <button onclick="_client.auth.signOut()" style="background:none; border:none; color:var(--danger); font-weight:bold; font-size:12px;">로그아웃</button>
                    </div>`;
            } else {
                area.innerHTML = `<button class="btn-auth" onclick="openAuthModal()">로그인 / 가입</button>`;
            }
        }

        function openAuthModal() {
            document.getElementById('authModal').style.display = 'flex';
            isSignupMode = false;
            updateAuthUI();
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // 🚀 로그인 ↔ 회원가입 화면 전환 함수
        function toggleAuthMode() {
            isSignupMode = !isSignupMode;
            updateAuthUI();
        }

        function updateAuthUI() {
            document.getElementById('modalTitle').innerText = isSignupMode ? '1초 만에 회원가입' : '로그인';
            document.getElementById('modalDesc').innerText = isSignupMode ? '아이디, 비번, 닉네임만 적으면 끝!' : '아이디와 비밀번호를 입력하세요.';
            document.getElementById('nickGroup').style.display = isSignupMode ? 'block' : 'none';
            document.getElementById('authSubmitBtn').innerText = isSignupMode ? '가입하기' : '로그인';
            document.getElementById('authToggleBtn').innerText = isSignupMode ? '이미 계정이 있나요? 로그인' : '계정이 없나요? 회원가입';
        }

        // 🚀 핵심: 이메일 대신 아이디로 처리하는 꼼수 로직
        async function executeAuth() {
            const idVal = document.getElementById('authId').value.trim();
            const pwVal = document.getElementById('authPw').value.trim();
            const nickVal = document.getElementById('authNick').value.trim();

            if (!idVal || !pwVal) return showToast("아이디와 비밀번호를 꼭 써주세요!", true);
            
            // 꼼수: 유저가 쓴 아이디 뒤에 몰래 가짜 이메일 주소를 붙임
            const dummyEmail = `${idVal}@entubefake.com`;

            const btn = document.getElementById('authSubmitBtn');
            btn.disabled = true; btn.innerText = "처리 중...";

            try {
                if (isSignupMode) {
                    if (!nickVal) throw new Error("닉네임을 입력해주세요!");
                    
                    // 1. 수퍼베이스에 가입 (가짜 이메일 사용)
                    const { data, error } = await _client.auth.signUp({ email: dummyEmail, password: pwVal });
                    if (error) throw error;

                    // 2. 가입하자마자 프로필 테이블에 닉네임 저장
                    if (data.user) {
                        await _client.from('profiles').update({ nickname: nickVal }).eq('id', data.user.id);
                    }
                    showToast("가입 성공! 환영합니다 🎉");
                    closeModal('authModal');
                    setTimeout(() => location.reload(), 500); // 닉네임 반영을 위해 새로고침
                } else {
                    // 로그인 처리
                    const { error } = await _client.auth.signInWithPassword({ email: dummyEmail, password: pwVal });
                    if (error) throw new Error("아이디나 비밀번호가 틀렸습니다.");
                    showToast("로그인 성공!");
                    closeModal('authModal');
                }
            } catch (err) {
                showToast(err.message, true);
            } finally {
                btn.disabled = false;
                btn.innerText = isSignupMode ? '가입하기' : '로그인';
            }
        }

        function timeAgo(dateString) {
            const seconds = Math.floor((new Date() - new Date(dateString)) / 1000);
            const intervals = { 년:31536000, 개월:2592000, 일:86400, 시간:3600, 분:60 };
            for (let [name, secs] of Object.entries(intervals)) {
                if (seconds >= secs) return Math.floor(seconds / secs) + `${name} 전`;
            }
            return "방금 전";
        }

        async function loadVideos(searchQuery = '') {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = Array(8).fill().map(() => `
                <div class="video-card">
                    <div class="thumbnail skeleton"></div>
                    <div class="details"><div class="details-avatar skeleton"></div><div style="flex:1;"><div class="skeleton" style="height:18px;width:85%;margin-bottom:8px;"></div><div class="skeleton" style="height:14px;width:50%;"></div></div></div>
                </div>`).join('');

            let query = _client.from('posts').select('*, profiles(nickname, avatar_url)').order('created_at', { ascending: false });
            if (searchQuery) query = query.ilike('title', `%${searchQuery}%`);
            
            const { data: videos } = await query;
            grid.innerHTML = '';
            
            if(!videos || videos.length === 0) return grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:#6c757d;">영상이 없습니다.</p>`;

            videos.forEach(v => {
                const safeTitle = escapeHTML(v.title || '제목 없음');
                const safeNick = escapeHTML(v.profiles?.nickname || '익명');
                const pfp = v.profiles?.avatar_url || defaultPfp;
                const viewMock = Math.floor(Math.random() * 900) + 10;
                
                const div = document.createElement('div');
                div.className = 'video-card';
                div.innerHTML = `
                    <video src="${v.video_url}" class="thumbnail" onmouseover="this.play()" onmouseout="this.pause(); this.currentTime=0;" muted loop></video>
                    <div class="details">
                        <img src="${pfp}" class="details-avatar">
                        <div class="meta">
                            <h3>${safeTitle}</h3>
                            <p>${safeNick}<br>조회수 ${viewMock}회 • ${timeAgo(v.created_at)}</p>
                        </div>
                    </div>`;
                grid.appendChild(div);
            });
        }

        function searchVideos() { loadVideos(document.getElementById('searchInput').value.trim()); }
    </script>
</body>
</html>
</body>
</html>
