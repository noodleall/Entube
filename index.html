<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entube - 프리미엄 완전판</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg-base: #f9fafb; --bg-surface: #ffffff; --bg-hover: #f3f4f6; 
            --text-primary: #111827; --text-secondary: #6b7280; 
            --brand-color: #2563eb; --divider: #e5e7eb; --danger: #ef4444;
            --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-base); color: var(--text-primary); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow-x: hidden; }
        * { box-sizing: border-box; }
        button { cursor: pointer; transition: 0.2s; font-family: inherit; }
        
        /* 헤더 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 32px; height: 72px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--divider); }
        .logo { font-size: 24px; font-weight: 800; cursor: pointer; }
        .logo span { color: var(--brand-color); }
        .search-box { display: flex; width: 480px; background: var(--bg-base); border-radius: var(--radius-xl); border: 1px solid transparent; }
        .search-box:focus-within { border-color: var(--brand-color); background: white; }
        .search-box input { flex: 1; padding: 12px 20px; background: transparent; border: none; outline: none; }
        .search-box button { padding: 10px 24px; background: transparent; border: none; font-weight: 600; color: var(--text-secondary); }
        .header-right { display: flex; gap: 16px; align-items: center; }
        .btn-auth { background: var(--text-primary); color: white; border: none; padding: 10px 24px; border-radius: var(--radius-xl); font-weight: 600; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 1px solid var(--divider); }

        /* 레이아웃 & 카테고리 */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 240px; padding: 24px 16px; background: var(--bg-surface); border-right: 1px solid var(--divider); }
        .content-area { flex: 1; overflow-y: auto; }
        .category-bar { display: flex; gap: 10px; padding: 16px 40px; position: sticky; top: 0; background: rgba(249, 250, 251, 0.95); z-index: 10; border-bottom: 1px solid var(--divider); }
        .chip { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--divider); background: white; font-weight: 600; color: var(--text-primary); }
        .chip.active { background: var(--text-primary); color: white; border-color: var(--text-primary); }

        /* 영상 그리드 */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 32px; padding: 32px 40px; }
        .video-card { cursor: pointer; transition: transform 0.2s; }
        .video-card:hover { transform: translateY(-4px); }
        .thumbnail { width: 100%; aspect-ratio: 16/9; border-radius: var(--radius-lg); background: #e9ecef; object-fit: cover; }
        .meta { margin-top: 12px; display: flex; gap: 12px; }
        .meta-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--divider); object-fit: cover; }
        .meta-info h3 { margin: 0 0 4px 0; font-size: 16px; font-weight: 700; line-height: 1.4; }
        .meta-info p { margin: 0; font-size: 14px; color: var(--text-secondary); }

        /* 📺 영상 확대 (플레이어) 모달 */
        .player-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; justify-content: center; overflow-y: auto; padding: 40px 0; }
        .player-content { background: white; width: 90%; max-width: 1000px; border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 40px; }
        .video-wrapper video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }
        .player-info { padding: 24px 32px; border-bottom: 1px solid var(--divider); display: flex; justify-content: space-between; align-items: center; }
        .player-title { font-size: 20px; font-weight: 800; margin: 0; }
        .btn-like { background: #f3f4f6; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; font-size: 15px; }
        .btn-like:hover { background: #e5e7eb; }
        
        /* 💬 댓글 */
        .comment-section { padding: 24px 32px; }
        .comment-input-area { display: flex; gap: 12px; margin-bottom: 24px; }
        .comment-input-area input { flex: 1; padding: 14px; border: 1px solid var(--divider); border-radius: 8px; }
        .comment-item { display: flex; gap: 12px; margin-bottom: 16px; }
        .comment-item img { width: 36px; height: 36px; border-radius: 50%; }

        /* 일반 모달 (로그인/프로필) */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 4000; justify-content: center; align-items: center; }
        .modal-card { background: white; padding: 40px; border-radius: var(--radius-lg); width: 400px; text-align: center; }
        .input-group { margin-bottom: 16px; }
        .input-group input { width: 100%; padding: 14px; border: 1px solid var(--divider); border-radius: 8px; }
        .btn-primary { width: 100%; padding: 14px; background: var(--brand-color); color: white; border: none; border-radius: 8px; font-weight: 700; }

        /* 토스트 */
        .toast-container { position: fixed; bottom: 32px; right: 32px; z-index: 5000; display: flex; flex-direction: column; gap: 12px; }
        .toast { background: var(--text-primary); color: white; padding: 16px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; opacity: 0; transform: translateY(20px); transition: 0.3s; }
        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <header class="header">
        <div class="logo" onclick="location.reload()">Entube<span>.</span></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="영상 검색..." onkeypress="if(event.key==='Enter') searchVideos()">
            <button onclick="searchVideos()">검색</button>
        </div>
        <div class="header-right" id="authSection"></div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div style="font-weight: 800; padding: 12px 16px; color:var(--brand-color); background:#eff6ff; border-radius:8px;">홈</div>
            <div style="padding: 12px 16px; font-weight:600; color:var(--text-secondary); cursor:pointer;">탐색</div>
            <div style="padding: 12px 16px; font-weight:600; color:var(--text-secondary); cursor:pointer;">구독</div>
        </aside>
        <main class="content-area">
            <div class="category-bar" id="categoryBar">
                <button class="chip active" onclick="setCategory('전체', this)">전체</button>
                <button class="chip" onclick="setCategory('엔터테인먼트', this)">엔터테인먼트</button>
                <button class="chip" onclick="setCategory('음악', this)">음악</button>
                <button class="chip" onclick="setCategory('게임', this)">게임</button>
                <button class="chip" onclick="setCategory('교육', this)">교육</button>
            </div>
            <div class="video-grid" id="videoGrid"></div>
        </main>
    </div>

    <div id="playerModal" class="player-modal" onclick="if(event.target==this) closePlayer()">
        <div class="player-content">
            <div class="video-wrapper">
                <video id="mainVideo" controls autoplay></video>
            </div>
            <div class="player-info">
                <div>
                    <h2 class="player-title" id="playerTitle">영상 제목</h2>
                    <p style="margin: 4px 0 0 0; color:var(--text-secondary);" id="playerMeta">유튜버 이름 • 방금 전</p>
                </div>
                <button class="btn-like" onclick="hitLike()">
                    👍 <span id="likeCount">0</span>
                </button>
            </div>
            <div class="comment-section">
                <div class="comment-input-area">
                    <input type="text" id="commentInput" placeholder="댓글 추가...">
                    <button class="btn-primary" style="width:auto; padding:0 24px;" onclick="postComment()">댓글 쓰기</button>
                </div>
                <div id="commentList" style="display:flex; flex-direction:column; gap:16px;"></div>
            </div>
            <button onclick="closePlayer()" style="width:100%; padding:16px; background:#f3f4f6; border:none; font-weight:bold; cursor:pointer;">화면 닫기</button>
        </div>
    </div>

    <div id="authModal" class="modal-overlay">
        <div class="modal-card">
            <h2 id="modalTitle">로그인</h2>
            <div class="input-group"><input type="text" id="authId" placeholder="아이디 (영문/숫자)"></div>
            <div class="input-group"><input type="password" id="authPw" placeholder="비밀번호 (6자 이상)"></div>
            <div class="input-group" id="nickGroup" style="display: none;"><input type="text" id="authNick" placeholder="사용할 닉네임"></div>
            <button class="btn-primary" id="authSubmitBtn" onclick="executeAuth()">로그인</button>
            <button onclick="toggleAuthMode()" style="background:none; border:none; color:var(--text-secondary); margin-top:16px; text-decoration:underline;">계정이 없으신가요?</button>
            <button onclick="closeModal('authModal')" style="display:block; margin:16px auto 0; background:none; border:none; color:#aaa;">취소</button>
        </div>
    </div>

    <div id="profileModal" class="modal-overlay">
        <div class="modal-card">
            <h2>내 채널 설정</h2>
            <img id="pfpPreview" src="" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; border: 2px solid var(--divider);">
            <div class="input-group"><input type="file" id="pfpInput" accept="image/*" onchange="previewImage(this)" style="padding:10px; border:none;"></div>
            <div class="input-group"><input type="text" id="nickInput" placeholder="새로운 닉네임 입력"></div>
            <button class="btn-primary" onclick="saveProfile()">설정 저장</button>
            <button onclick="closeModal('profileModal')" style="display:block; margin:16px auto 0; background:none; border:none; color:#aaa;">취소</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://kzchubdwrkcpmuempgrg.supabase.co';
        const supabaseKey = 'sb_publishable_MyFF5Xln3fWLvTqMx2CFNA_obZtoask'; 
        const _client = window.supabase.createClient(supabaseUrl, supabaseKey);

        let myProfile = null;
        let isSignupMode = false;
        let currentCategory = '전체';
        let currentVideo = null; // 현재 재생중인 영상 정보 저장
        const defaultPfp = 'https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png';

        function escapeHTML(str) { return str ? String(str).replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t)) : ''; }
        function showToast(msg, isError = false) {
            const box = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${isError ? 'error' : ''}`; t.innerText = msg;
            box.appendChild(t); setTimeout(() => t.classList.add('show'), 10);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
        }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // 초기화 및 인증
        async function init() {
            const { data: { session } } = await _client.auth.getSession();
            if (session) {
                const { data } = await _client.from('profiles').select('*').eq('id', session.user.id).single();
                myProfile = data || { id: session.user.id, nickname: '익명', avatar_url: defaultPfp };
            }
            renderHeader(); loadVideos();
        }
        _client.auth.onAuthStateChange((e, s) => { if (e === 'SIGNED_IN' || e === 'SIGNED_OUT') init(); });

        function renderHeader() {
            const area = document.getElementById('authSection');
            if (myProfile) {
                // 🚀 프사 클릭 시 프로필 변경 모달 뜨게 연결!
                area.innerHTML = `
                    <button class="btn-primary" style="padding:10px 16px; margin:0;" onclick="location.href='upload.html'">업로드</button>
                    <div style="display:flex; align-items:center; gap:12px; margin-left:10px;">
                        <img src="${myProfile.avatar_url || defaultPfp}" class="profile-img" onclick="openProfileEdit()" title="클릭해서 프로필 수정">
                        <div style="display:flex; flex-direction:column;">
                            <span style="font-weight:700; font-size:14px;">${escapeHTML(myProfile.nickname)}</span>
                            <button onclick="_client.auth.signOut()" style="background:none; border:none; color:var(--text-secondary); font-size:12px; text-align:left; padding:0;">로그아웃</button>
                        </div>
                    </div>`;
            } else {
                area.innerHTML = `<button class="btn-auth" onclick="openModal('authModal')">로그인</button>`;
            }
        }

        // 로그인 / 가입 로직
        function toggleAuthMode() {
            isSignupMode = !isSignupMode;
            document.getElementById('modalTitle').innerText = isSignupMode ? '회원가입' : '로그인';
            document.getElementById('nickGroup').style.display = isSignupMode ? 'block' : 'none';
            document.getElementById('authSubmitBtn').innerText = isSignupMode ? '가입하기' : '로그인';
        }

        async function executeAuth() {
            const id = document.getElementById('authId').value.trim();
            const pw = document.getElementById('authPw').value.trim();
            const nick = document.getElementById('authNick').value.trim();
            if (!id || !pw) return showToast("입력칸을 채워주세요", true);
            const email = `${id}@entubefake.com`;

            try {
                if (isSignupMode) {
                    if (!nick) throw new Error("닉네임 필수!");
                    const { data, error } = await _client.auth.signUp({ email, password: pw });
                    if (error) throw error;
                    if (data.user) await _client.from('profiles').update({ nickname: nick }).eq('id', data.user.id);
                    showToast("가입 성공!"); closeModal('authModal'); setTimeout(()=>location.reload(), 500);
                } else {
                    const { error } = await _client.auth.signInWithPassword({ email, password: pw });
                    if (error) throw new Error("정보가 틀렸습니다.");
                    closeModal('authModal'); showToast("로그인 성공");
                }
            } catch(e) { showToast(e.message, true); }
        }

        // 🚀 닉네임/프로필 저장 로직 복구
        function openProfileEdit() {
            openModal('profileModal');
            document.getElementById('pfpPreview').src = myProfile.avatar_url || defaultPfp;
            document.getElementById('nickInput').value = myProfile.nickname || '';
        }
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('pfpPreview').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }
        async function saveProfile() {
            const nick = document.getElementById('nickInput').value.trim();
            const file = document.getElementById('pfpInput').files[0];
            if (!nick) return showToast("닉네임을 입력하세요.", true);

            let url = myProfile.avatar_url;
            try {
                if (file) {
                    const path = `pfp_${Date.now()}.${file.name.split('.').pop()}`;
                    await _client.storage.from('avatars').upload(path, file);
                    url = _client.storage.from('avatars').getPublicUrl(path).data.publicUrl;
                }
                await _client.from('profiles').update({ nickname: nick, avatar_url: url }).eq('id', myProfile.id);
                showToast("프로필 업데이트 완료!"); setTimeout(()=>location.reload(), 800);
            } catch(e) { showToast("저장 실패", true); }
        }

        // 🚀 카테고리 필터
        function setCategory(cat, btn) {
            currentCategory = cat;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            loadVideos();
        }

        function timeAgo(date) {
            const s = Math.floor((new Date() - new Date(date)) / 1000);
            const i = { 년:31536000, 달:2592000, 일:86400, 시간:3600, 분:60 };
            for (let [n, sec] of Object.entries(i)) if (s >= sec) return Math.floor(s / sec) + `${n} 전`;
            return "방금 전";
        }

        // 영상 로드
        async function loadVideos(searchQuery = '') {
            const grid = document.getElementById('videoGrid');
            let query = _client.from('posts').select('*, profiles(nickname, avatar_url)').order('created_at', { ascending: false });
            
            if (currentCategory !== '전체') query = query.eq('category', currentCategory);
            if (searchQuery) query = query.ilike('title', `%${searchQuery}%`);
            
            const { data: videos } = await query;
            grid.innerHTML = '';
            
            if(!videos || videos.length === 0) return grid.innerHTML = `<p style="grid-column:1/-1; color:var(--text-secondary);">영상이 없습니다.</p>`;

            videos.forEach(v => {
                const safeTitle = escapeHTML(v.title || '제목 없음');
                const safeNick = escapeHTML(v.profiles?.nickname || '익명');
                const pfp = v.profiles?.avatar_url || defaultPfp;
                const likes = v.likes || 0;
                
                const div = document.createElement('div');
                div.className = 'video-card';
                div.onclick = () => openPlayer(v);
                div.innerHTML = `
                    <video src="${v.video_url}" class="thumbnail"></video>
                    <div class="meta">
                        <img src="${pfp}" class="meta-avatar">
                        <div class="meta-info">
                            <h3>${safeTitle}</h3>
                            <p>${safeNick}<br>👍 ${likes} • ${timeAgo(v.created_at)}</p>
                        </div>
                    </div>`;
                grid.appendChild(div);
            });
        }
        function searchVideos() { loadVideos(document.getElementById('searchInput').value.trim()); }

        // 📺 플레이어 & 댓글 & 좋아요
        function openPlayer(video) {
            currentVideo = video;
            document.getElementById('playerModal').style.display = 'flex';
            document.getElementById('mainVideo').src = video.video_url;
            document.getElementById('playerTitle').innerText = escapeHTML(video.title);
            document.getElementById('playerMeta').innerText = `${escapeHTML(video.profiles?.nickname)} • ${timeAgo(video.created_at)}`;
            document.getElementById('likeCount').innerText = video.likes || 0;
            loadComments(video.id);
        }
        function closePlayer() {
            document.getElementById('playerModal').style.display = 'none';
            document.getElementById('mainVideo').pause();
        }

        // 🚀 좋아요 기능
        async function hitLike() {
            if (!myProfile) return showToast("로그인 후 이용할 수 있습니다.", true);
            const newLikes = (currentVideo.likes || 0) + 1;
            
            const { error } = await _client.from('posts').update({ likes: newLikes }).eq('id', currentVideo.id);
            if(error) return showToast("오류 발생", true);
            
            currentVideo.likes = newLikes;
            document.getElementById('likeCount').innerText = newLikes;
            showToast("좋아요를 눌렀습니다! 👍");
            loadVideos(document.getElementById('searchInput').value.trim()); // 뒤쪽 그리드도 업데이트
        }

        async function loadComments(postId) {
            const { data: comments } = await _client.from('comments').select('*, profiles(nickname, avatar_url)').eq('post_id', postId).order('created_at', { ascending: true });
            const list = document.getElementById('commentList');
            list.innerHTML = '';
            if(!comments.length) return list.innerHTML = '<p style="color:#aaa;">첫 댓글을 남겨보세요!</p>';
            
            comments.forEach(c => {
                const pfp = c.profiles?.avatar_url || defaultPfp;
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = `
                    <img src="${pfp}">
                    <div>
                        <b style="font-size:13px; color:var(--text-secondary);">${escapeHTML(c.profiles?.nickname)}</b>
                        <div style="font-size:15px; margin-top:2px;">${escapeHTML(c.content)}</div>
                    </div>`;
                list.appendChild(div);
            });
        }

        async function postComment() {
            if (!myProfile) return showToast("로그인이 필요합니다.", true);
            const content = document.getElementById('commentInput').value.trim();
            if (!content) return;

            const { error } = await _client.from('comments').insert([{ post_id: currentVideo.id, author_id: myProfile.id, content }]);
            if (error) return showToast("댓글 작성 실패", true);
            
            document.getElementById('commentInput').value = '';
            loadComments(currentVideo.id);
            showToast("댓글이 등록되었습니다.");
        }

        init();
    </script>
</body>
</html>
