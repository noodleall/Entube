<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Entube - 업로드</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #212121; padding: 30px; border-radius: 15px; width: 400px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #121212; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: red; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>영상 업로드</h2>
        <input type="text" id="title" placeholder="영상 제목">
        <input type="file" id="video" accept="video/*">
        <button id="btn" onclick="upload()">유튜브에 올리기</button>
        <p id="msg"></p>
        <a href="index.html" style="color:#aaa; font-size:12px; display:block; margin-top:15px;">취소하고 돌아가기</a>
    </div>

    <script>
        const supabaseUrl = 'https://kzchubdwrkcpmuempgrg.supabase.co';
        const supabaseKey = 'sb_publishable_MyFF5Xln3fWLvTqMx2CFNA_obZtoask'; 
        const _client = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function upload() {
            const title = document.getElementById('title').value;
            const file = document.getElementById('video').files[0];
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');

            const { data: { session } } = await _client.auth.getSession();
            if(!session) return alert("로그인부터 해!");
            if(!title || !file) return alert("다 입력해!");

            btn.disabled = true; msg.innerText = "업로드 중... (창 닫지 마!)";

            const path = `video_${Date.now()}.${file.name.split('.').pop()}`;
            const { error: upErr } = await _client.storage.from('videos').upload(path, file);
            if(upErr) return alert(upErr.message);

            const { data: { publicUrl } } = _client.storage.from('videos').getPublicUrl(path);
            await _client.from('posts').insert([{ title, video_url: publicUrl, author_id: session.user.id }]);
            
            alert("업로드 완료!");
            location.href = 'index.html';
        }
    </script>
</body>
</html>
