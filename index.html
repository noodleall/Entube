<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entube</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
    --bg-base:#f9fafb;
    --bg-surface:#fff;
    --text-primary:#111;
    --text-secondary:#666;
    --brand:#2563eb;
}

body {margin:0;font-family:sans-serif;background:var(--bg-base);}
button {cursor:pointer;border:none}

/* 헤더 */
.header {
    display:flex;justify-content:space-between;
    padding:16px 32px;background:#fff;
    border-bottom:1px solid #ddd;
}

.video-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;padding:20px;
}

.video-card {cursor:pointer}
.thumbnail {width:100%;aspect-ratio:16/9;background:#eee}

/* 🔥 모달 */
.player-modal {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    z-index:999;

    justify-content:center;
    align-items:flex-start;
    overflow-y:auto;
    padding:40px 0;
}

.player-content {
    background:#fff;
    width:90%;
    max-width:900px;

    max-height:90vh;
    display:flex;
    flex-direction:column;
    border-radius:12px;
}

.video-wrapper video {
    width:100%;
    aspect-ratio:16/9;
    background:black;
}

.player-info {
    padding:16px;
    display:flex;
    justify-content:space-between;
}

.comment-area {
    flex:1;
    overflow-y:auto;
    padding:16px;
}
</style>
</head>

<body>

<header class="header">
    <b>Entube</b>
    <button onclick="login()">로그인</button>
</header>

<div class="video-grid" id="videoGrid"></div>

<!-- 🎬 플레이어 -->
<div id="playerModal" class="player-modal" onclick="if(event.target==this) closePlayer()">
    <div class="player-content">

        <div class="video-wrapper">
            <video id="mainVideo" controls autoplay></video>
        </div>

        <div class="player-info">
            <div>
                <h3 id="title"></h3>
                <p id="author"></p>
            </div>
            <button onclick="hitLike()">👍 <span id="likeCount">0</span></button>
        </div>

        <div class="comment-area">
            <input id="commentInput" placeholder="댓글">
            <button onclick="postComment()">등록</button>
            <div id="commentList"></div>
        </div>

    </div>
</div>

<script>
const supabase = window.supabase.createClient(
'https://kzchubdwrkcpmuempgrg.supabase.co',
'sb_publishable_MyFF5Xln3fWLvTqMx2CFNA_obZtoask'
);

let user = null;
let currentVideo = null;

/* 로그인 */
async function login(){
    const id = prompt("아이디");
    const pw = prompt("비번");

    const {error} = await supabase.auth.signInWithPassword({
        email:id+"@a.com",
        password:pw
    });

    if(error) alert(error.message);
    else location.reload();
}

/* 영상 불러오기 */
async function loadVideos(){
    const {data} = await supabase
        .from('posts')
        .select('*');

    const grid = document.getElementById('videoGrid');
    grid.innerHTML='';

    data.forEach(v=>{
        const div=document.createElement('div');
        div.className='video-card';
        div.innerHTML=`<video src="${v.video_url}" class="thumbnail"></video>`;
        div.onclick=()=>openPlayer(v);
        grid.appendChild(div);
    });
}

/* 플레이어 */
function openPlayer(v){
    currentVideo=v;
    document.getElementById('playerModal').style.display='flex';
    mainVideo.src=v.video_url;
    title.innerText=v.title;
    author.innerText=v.user_id;
    likeCount.innerText=v.likes||0;
    loadComments(v.id);
}

function closePlayer(){
    playerModal.style.display='none';
    mainVideo.pause();
}

/* 👍 좋아요 */
async function hitLike(){
    if(!currentVideo) return;

    const {data:session} = await supabase.auth.getUser();
    if(!session.user) return alert("로그인 필요");

    const uid=session.user.id;

    const {data:exist} = await supabase
        .from('likes')
        .select('*')
        .eq('post_id',currentVideo.id)
        .eq('user_id',uid)
        .single();

    if(exist){
        return alert("이미 누름");
    }

    await supabase.from('likes').insert({
        post_id:currentVideo.id,
        user_id:uid
    });

    const newLikes=(currentVideo.likes||0)+1;

    await supabase.from('posts')
        .update({likes:newLikes})
        .eq('id',currentVideo.id);

    likeCount.innerText=newLikes;
    currentVideo.likes=newLikes;
}

/* 💬 댓글 */
async function loadComments(postId){
    const {data} = await supabase
        .from('comments')
        .select('*')
        .eq('post_id',postId);

    const list=document.getElementById('commentList');
    list.innerHTML='';

    data.forEach(c=>{
        const d=document.createElement('div');
        d.innerText=c.content;
        list.appendChild(d);
    });
}

async function postComment(){
    const txt=document.getElementById('commentInput').value;
    if(!txt) return;

    const {data:session} = await supabase.auth.getUser();
    if(!session.user) return alert("로그인 필요");

    await supabase.from('comments').insert({
        post_id:currentVideo.id,
        author_id:session.user.id,
        content:txt
    });

    commentInput.value='';
    loadComments(currentVideo.id);
}

loadVideos();
</script>

</body>
</html>
