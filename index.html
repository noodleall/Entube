<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entube - 프리미엄</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* [1] 초깔끔 미니멀리즘 테마 변수 */
        :root { 
            --bg-base: #f9fafb; --bg-surface: #ffffff; --bg-hover: #f3f4f6; 
            --text-primary: #111827; --text-secondary: #6b7280; 
            --brand-color: #2563eb; --divider: #e5e7eb; --danger: #ef4444;
            --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px;
        }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg-base); color: var(--text-primary); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow-x: hidden; letter-spacing: -0.3px; }
        * { box-sizing: border-box; }
        button { cursor: pointer; transition: all 0.2s ease; font-family: inherit; }
        
        /* [2] 헤더 & 네비게이션 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 32px; height: 72px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--divider); }
        .logo { font-size: 24px; font-weight: 800; color: var(--text-primary); cursor: pointer; letter-spacing: -1px; }
        .logo span { color: var(--brand-color); }
        
        /* 둥글고 깔끔한 검색창 */
        .search-box { display: flex; width: 480px; background: var(--bg-base); border-radius: var(--radius-xl); overflow: hidden; border: 1px solid transparent; transition: border 0.2s; }
        .search-box:focus-within { border: 1px solid var(--brand-color); background: var(--bg-surface); }
        .search-box input { flex: 1; padding: 14px 20px; background: transparent; border: none; color: var(--text-primary); outline: none; font-size: 15px; }
        .search-box button { padding: 10px 24px; background: transparent; border: none; font-weight: 600; color: var(--text-secondary); }
        .search-box button:hover { color: var(--brand-color); }

        .header-right { display: flex; gap: 16px; align-items: center; }
        .btn-auth { background: var(--text-primary); color: white; border: none; padding: 10px 24px; border-radius: var(--radius-xl); font-weight: 600; font-size: 14px; }
        .btn-auth:hover { background: #000000; transform: translateY(-1px); }
        .btn-upload { background: var(--bg-surface); border: 1px solid var(--divider); padding: 10px 20px; border-radius: var(--radius-xl); font-weight: 600; font-size: 14px; color: var(--text-primary); }
        .btn-upload:hover { background: var(--bg-hover); }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 1px solid var(--divider); }

        /* [3] 메인 레이아웃 */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 240px; padding: 24px 16px; background: var(--bg-surface); border-right: 1px solid var(--divider); }
        .sidebar-item { padding: 14px 20px; font-weight: 600; cursor: pointer; border-radius: var(--radius-md); margin-bottom: 4px; color: var(--text-secondary); font-size: 15px; }
        .sidebar-item.active { background: #eff6ff; color: var(--brand-color); }
        .sidebar-item:hover:not(.active) { background: var(--bg-base); color: var(--text-primary); }
        .content-area { flex: 1; overflow-y: auto; padding: 32px 40px; }
        
        /* [4] 영상 그리드 */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 32px; row-gap: 48px; }
        .video-card { display: flex; flex-direction: column; gap: 16px; cursor: pointer; transition: transform 0.2s; }
        .video-card:hover { transform: translateY(-4px); }
        .thumbnail { width: 100%; aspect-ratio: 16/9; border-radius: var(--radius-lg); background: #e9ecef; object-fit: cover; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .details { display: flex; gap: 16px; }
        .details-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--divider); object-fit: cover; }
        .meta h3 { margin: 0 0 8px 0; font-size: 16px; font-weight: 700; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .meta p { margin: 0; font-size: 14px; color: var(--text-secondary); line-height: 1.4; }
        
        @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: calc(200px + 100%) 0; } }
        .skeleton { background: linear-gradient(90deg, #f3f4f6 25%, #ffffff 50%, #f3f4f6 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }

        /* [5] 모달 & 둥근 입력 폼 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 2000; }
        .modal-card { background: var(--bg-surface); padding: 48px 40px; border-radius: var(--radius-lg); width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .modal-card h2 { margin: 0 0 12px 0; font-size: 24px; font-weight: 800; text-align: center; }
        .input-group { margin-bottom: 16px; }
        .input-group input { width: 100%; padding: 16px; border: 1px solid var(--divider); border-radius: var(--radius-md); font-size: 15px; background: var(--bg-base); transition: 0.2s; }
        .input-group input:focus { border-color: var(--brand-color); outline: none; background: var(--bg-surface); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn-primary { width: 100%; padding: 16px; background: var(--brand-color); color: white; border: none; border-radius: var(--radius-md); font-weight: 700; margin-top: 8px; font-size: 16px; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-toggle { width: 100%; padding: 16px; background: transparent; border: none; color: var(--text-secondary); font-weight: 600; margin-top: 8px; }
        .btn-toggle:hover { color: var(--text-primary); }

        /* [6] 토스트 알림 */
        .toast-container { position: fixed; bottom: 32px; right: 32px; z-index: 3000; display: flex; flex-direction: column; gap: 12px; }
        .toast { background: var(--text-primary); color: white; padding: 16px 24px; border-radius: var(--radius-md); font-size: 14px; font-weight: 600; opacity: 0; transform: translateY(20px); transition: all 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: var(--danger); }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <header class="header">
        <div class="logo" onclick="location.reload()">Entube<span>.</span></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="어떤 영상을 찾고 계신가요?" onkeypress="if(event.key==='Enter') searchVideos()">
            <button onclick="searchVideos()">검색</button>
        </div>
        <div class="header-right" id="authSection">
            <button class="btn-auth" onclick="openAuthModal()">로그인 / 가입</button>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-item active" onclick="location.reload()">홈</div>
            <div class="sidebar-item">탐색</div>
            <div class="sidebar-item">구독</div>
            <div style="height: 1px; background: var(--divider); margin: 16px 0;"></div>
            <div class="sidebar-item">보관함</div>
        </aside>
        <main class="content-area">
            <div class="video-grid" id="videoGrid"></div>
        </main>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="modal-card">
            <h2 id="modalTitle">로그인</h2>
            <p id="modalDesc" style="color:var(--text-secondary); font-size:14px; margin-bottom:32px; text-align:center;">아이디와 비밀번호를 입력하세요</p>
            
            <div class="input-group">
                <input type="text" id="authId" placeholder="아이디 (영문/숫자)">
            </div>
            <div class="input-group">
                <input type="password" id="authPw" placeholder="비밀번호 (6자 이상)">
            </div>
            <div class="input-group" id="nickGroup" style="display: none;">
                <input type="text" id="authNick" placeholder="사용할 닉네임 (예: Entube크리에이터)">
            </div>

            <button class="btn-primary" id="authSubmitBtn" onclick="executeAuth()">로그인</button>
            <button class="btn-toggle" id="authToggleBtn" onclick="toggleAuthMode()">계정이 없으신가요?</button>
            <button class="btn-toggle" style="color:#adb5bd; margin-top:0;" onclick="closeModal('authModal')">취소</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://kzchubdwrkcpmuempgrg.supabase.co';
        const supabaseKey = 'sb_publishable_MyFF5Xln3fWLvTqMx2CFNA_obZtoask'; 
        const _client = window.supabase.createClient(supabaseUrl, supabaseKey);

        let myProfile = null;
        let isSignupMode = false;
        const defaultPfp = 'https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png';

        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        function showToast(message, isError = false) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // 🚀 버튼 안 보이는 버그 원천 차단: 페이지 열리자마자 세션을 강제로 1번 체크함
        async function initializeApp() {
            const { data: { session } } = await _client.auth.getSession();
            if (session) {
                const { data } = await _client.from('profiles').select('*').eq('id', session.user.id).single();
                myProfile = data || { id: session.user.id, nickname: '익명', avatar_url: defaultPfp };
            }
            renderHeader(); // 여기서 무조건 헤더를 1번 그려줍니다!
            loadVideos();
        }

        // 로그인 상태 변할 때만 다시 렌더링
        _client.auth.onAuthStateChange((_event, session) => {
            if (_event === 'SIGNED_IN' || _event === 'SIGNED_OUT') {
                initializeApp(); 
            }
        });

        function renderHeader() {
            const area = document.getElementById('authSection');
            if (myProfile) {
                area.innerHTML = `
                    <button class="btn-upload" onclick="location.href='upload.html'">영상 올리기</button>
                    <div style="display:flex; align-items:center; gap:12px; margin-left:8px;">
                        <img src="${myProfile.avatar_url || defaultPfp}" class="profile-img">
                        <div style="display:flex; flex-direction:column;">
                            <span style="font-weight:700; font-size:14px;">${escapeHTML(myProfile.nickname)}</span>
                            <button onclick="_client.auth.signOut()" style="background:none; border:none; color:var(--text-secondary); font-weight:600; font-size:12px; padding:0; text-align:left;">로그아웃</button>
                        </div>
                    </div>`;
            } else {
                area.innerHTML = `<button class="btn-auth" onclick="openAuthModal()">로그인</button>`;
            }
        }

        function openAuthModal() {
            document.getElementById('authModal').style.display = 'flex';
            isSignupMode = false;
            updateAuthUI();
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function toggleAuthMode() {
            isSignupMode = !isSignupMode;
            updateAuthUI();
        }

        function updateAuthUI() {
            document.getElementById('modalTitle').innerText = isSignupMode ? '새 계정 만들기' : '로그인';
            document.getElementById('modalDesc').innerText = isSignupMode ? '아이디와 닉네임만 있으면 충분해요' : '아이디와 비밀번호를 입력하세요';
            document.getElementById('nickGroup').style.display = isSignupMode ? 'block' : 'none';
            document.getElementById('authSubmitBtn').innerText = isSignupMode ? '가입 완료' : '로그인';
            document.getElementById('authToggleBtn').innerText = isSignupMode ? '이미 계정이 있으신가요?' : '계정이 없으신가요?';
        }

        async function executeAuth() {
            const idVal = document.getElementById('authId').value.trim();
            const pwVal = document.getElementById('authPw').value.trim();
            const nickVal = document.getElementById('authNick').value.trim();

            if (!idVal || !pwVal) return showToast("아이디와 비밀번호를 모두 입력해주세요", true);
            
            const dummyEmail = `${idVal}@entubefake.com`;
            const btn = document.getElementById('authSubmitBtn');
            btn.disabled = true; btn.innerText = "처리 중...";

            try {
                if (isSignupMode) {
                    if (!nickVal) throw new Error("사용하실 닉네임을 입력해주세요");
                    
                    const { data, error } = await _client.auth.signUp({ email: dummyEmail, password: pwVal });
                    if (error) throw error;

                    if (data.user) {
                        await _client.from('profiles').update({ nickname: nickVal }).eq('id', data.user.id);
                    }
                    showToast("가입을 환영합니다! 🎉");
                    closeModal('authModal');
                    setTimeout(() => location.reload(), 500); 
                } else {
                    const { error } = await _client.auth.signInWithPassword({ email: dummyEmail, password: pwVal });
                    if (error) throw new Error("아이디나 비밀번호를 다시 확인해주세요.");
                    showToast("로그인되었습니다");
                    closeModal('authModal');
                }
            } catch (err) {
                showToast(err.message, true);
            } finally {
                btn.disabled = false;
                btn.innerText = isSignupMode ? '가입 완료' : '로그인';
            }
        }

        function timeAgo(dateString) {
            const seconds = Math.floor((new Date() - new Date(dateString)) / 1000);
            const intervals = { 년:31536000, 개월:2592000, 일:86400, 시간:3600, 분:60 };
            for (let [name, secs] of Object.entries(intervals)) {
                if (seconds >= secs) return Math.floor(seconds / secs) + `${name} 전`;
            }
            return "방금 전";
        }

        async function loadVideos(searchQuery = '') {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = Array(8).fill().map(() => `
                <div class="video-card">
                    <div class="thumbnail skeleton"></div>
                    <div class="details"><div class="details-avatar skeleton"></div><div style="flex:1;"><div class="skeleton" style="height:18px;width:85%;margin-bottom:8px;"></div><div class="skeleton" style="height:14px;width:50%;"></div></div></div>
                </div>`).join('');

            let query = _client.from('posts').select('*, profiles(nickname, avatar_url)').order('created_at', { ascending: false });
            if (searchQuery) query = query.ilike('title', `%${searchQuery}%`);
            
            const { data: videos } = await query;
            grid.innerHTML = '';
            
            if(!videos || videos.length === 0) return grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:var(--text-secondary);font-size:15px;padding:40px;">등록된 영상이 없습니다.</p>`;

            videos.forEach(v => {
                const safeTitle = escapeHTML(v.title || '제목 없음');
                const safeNick = escapeHTML(v.profiles?.nickname || '익명');
                const pfp = v.profiles?.avatar_url || defaultPfp;
                const viewMock = Math.floor(Math.random() * 900) + 10;
                
                const div = document.createElement('div');
                div.className = 'video-card';
                div.innerHTML = `
                    <video src="${v.video_url}" class="thumbnail" onmouseover="this.play()" onmouseout="this.pause(); this.currentTime=0;" muted loop></video>
                    <div class="details">
                        <img src="${pfp}" class="details-avatar">
                        <div class="meta">
                            <h3>${safeTitle}</h3>
                            <p>${safeNick}<br>조회수 ${viewMock}회 • ${timeAgo(v.created_at)}</p>
                        </div>
                    </div>`;
                grid.appendChild(div);
            });
        }

        function searchVideos() { loadVideos(document.getElementById('searchInput').value.trim()); }

        // 🚀 앱 초기화 실행 (무조건 실행되므로 버튼이 무조건 뜹니다)
        initializeApp();
    </script>
</body>
</html>
