<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entube - мҳҒмғҒ м—…лЎңл“ң</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg-base: #f9fafb; --bg-surface: #ffffff; --bg-hover: #f3f4f6; 
            --text-primary: #111827; --text-secondary: #6b7280; 
            --brand-color: #2563eb; --divider: #e5e7eb; --radius-lg: 16px;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-base); color: var(--text-primary); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        * { box-sizing: border-box; }
        
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 32px; height: 72px; background: white; border-bottom: 1px solid var(--divider); position: sticky; top: 0; }
        .logo { font-size: 24px; font-weight: 800; cursor: pointer; text-decoration: none; color: black; }
        .logo span { color: var(--brand-color); }

        .upload-container { background: white; width: 100%; max-width: 600px; padding: 48px; border-radius: var(--radius-lg); margin-top: 60px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { font-size: 28px; font-weight: 800; margin: 0 0 8px 0; text-align: center; }
        p { color: var(--text-secondary); text-align: center; margin-bottom: 40px; }

        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); }
        input[type="text"], select { width: 100%; padding: 14px; border: 1px solid var(--divider); border-radius: 12px; font-size: 15px; outline: none; background: var(--bg-base); transition: 0.2s; }
        input[type="text"]:focus, select:focus { border-color: var(--brand-color); background: white; box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }

        /* нҢҢмқј м„ нғқ л°•мҠӨ м»ӨмҠӨн…Җ */
        .file-upload-box { border: 2px dashed var(--divider); padding: 40px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; background: var(--bg-base); }
        .file-upload-box:hover { border-color: var(--brand-color); background: #eff6ff; }
        .file-upload-box p { margin: 0; font-size: 14px; font-weight: 600; color: var(--brand-color); }
        #videoInput { display: none; }

        .btn-submit { width: 100%; padding: 18px; background: var(--brand-color); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; margin-top: 20px; cursor: pointer; transition: 0.3s; }
        .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; }
        .btn-submit:hover:not(:disabled) { background: #1d4ed8; transform: translateY(-2px); }

        /* лЎңл”© л°” мҠӨнғҖмқј */
        #progressContainer { display: none; margin-top: 20px; }
        .progress-bar { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--brand-color); transition: width 0.3s; }

        .toast-container { position: fixed; bottom: 24px; right: 24px; }
        .toast { background: #111; color: white; padding: 16px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; opacity: 0; transition: 0.3s; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo">Entube<span>.</span></a>
        <div id="userInfo" style="font-weight: 700; font-size: 14px;">лЎңк·ёмқё нҷ•мқё мӨ‘...</div>
    </header>

    <div class="upload-container">
        <h1>мҳҒмғҒ м—…лЎңл“ң</h1>
        <p>м№ңкө¬л“Өкіј кіөмң н•ҳкі  мӢ¶мқҖ л©Ӣм§„ мҳҒмғҒмқ„ мҳ¬л Өліҙм„ёмҡ”.</p>

        <div class="form-group">
            <label>мҳҒмғҒ нҢҢмқј</label>
            <label for="videoInput" class="file-upload-box" id="dropZone">
                <p id="fileNameDisplay">нҒҙлҰӯн•ҙм„ң MP4 мҳҒмғҒмқ„ м„ нғқн•ҳм„ёмҡ”</p>
                <span style="font-size: 12px; color: #94a3b8;">мөңлҢҖ 50MB к¶ҢмһҘ</span>
            </label>
            <input type="file" id="videoInput" accept="video/mp4,video/x-m4v,video/*">
        </div>

        <div class="form-group">
            <label>м ңлӘ©</label>
            <input type="text" id="videoTitle" placeholder="мҳҒмғҒмқҳ м ңлӘ©мқ„ мһ…л Ҙн•ҳм„ёмҡ”">
        </div>

        <div class="form-group">
            <label>м№ҙн…Ңкі лҰ¬</label>
            <select id="videoCategory">
                <option value="м—”н„°н…ҢмқёлЁјнҠё">м—”н„°н…ҢмқёлЁјнҠё</option>
                <option value="мқҢм•…">мқҢм•…</option>
                <option value="кІҢмһ„">кІҢмһ„</option>
                <option value="лүҙмҠӨ">лүҙмҠӨ</option>
                <option value="көҗмңЎ">көҗмңЎ</option>
            </select>
        </div>

        <button class="btn-submit" id="uploadBtn" onclick="startUpload()">м—…лЎңл“ң мӢңмһ‘н•ҳкё°</button>

        <div id="progressContainer">
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:8px;">
                <span id="statusText">м„ңлІ„лЎң м „мҶЎ мӨ‘...</span>
                <span id="percentText">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const supabaseUrl = 'https://kzchubdwrkcpmuempgrg.supabase.co';
        const supabaseKey = 'sb_publishable_MyFF5Xln3fWLvTqMx2CFNA_obZtoask'; 
        const _client = window.supabase.createClient(supabaseUrl, supabaseKey);

        let myProfile = null;

        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(()=>t.classList.add('show'), 10);
            setTimeout(()=>{t.classList.remove('show'); setTimeout(()=>t.remove(), 300);}, 3000);
        }

        // лЎңк·ёмқё мІҙнҒ¬
        async function checkAuth() {
            const { data: { session } } = await _client.auth.getSession();
            if (!session) {
                alert("лЎңк·ёмқёмқҙ н•„мҡ”н•ң нҺҳмқҙм§Җмһ…лӢҲлӢӨ!");
                location.href = 'index.html';
                return;
            }
            const { data } = await _client.from('profiles').select('*').eq('id', session.user.id).single();
            myProfile = data;
            document.getElementById('userInfo').innerText = `${myProfile.nickname}лӢҳ мұ„л„җ`;
        }

        // нҢҢмқј м„ нғқ мӢң мқҙлҰ„ н‘ңмӢң
        document.getElementById('videoInput').onchange = function() {
            const file = this.files[0];
            if(file) document.getElementById('fileNameDisplay').innerText = `м„ нғқлҗЁ: ${file.name}`;
        };

        async function startUpload() {
            const file = document.getElementById('videoInput').files[0];
            const title = document.getElementById('videoTitle').value.trim();
            const category = document.getElementById('videoCategory').value;

            if (!file || !title) return showToast("нҢҢмқјкіј м ңлӘ©мқ„ лӘЁл‘җ нҷ•мқён•ҙ мЈјм„ёмҡ”!");

            const btn = document.getElementById('uploadBtn');
            const progress = document.getElementById('progressContainer');
            const fill = document.getElementById('progressFill');
            const pText = document.getElementById('percentText');

            btn.disabled = true;
            btn.innerText = "м—…лЎңл“ң мӨ‘...";
            progress.style.display = 'block';

            try {
                // 1. Storageм—җ нҢҢмқј м—…лЎңл“ң
                const fileName = `video_${Date.now()}_${Math.random().toString(36).substr(2, 9)}.mp4`;
                
                // (м°ёкі ) мҲҳнҚјлІ мқҙмҠӨ JS SDK v2лҠ” м—…лЎңл“ң м§„н–үлҘ мқ„ нҷ•мқён•ҳл Өл©ҙ м•„лһҳмҷҖ к°ҷмқҖ мҳөм…ҳмқҙ н•„мҡ”н•Ё
                const { data: uploadData, error: uploadError } = await _client.storage
                    .from('videos')
                    .upload(fileName, file, {
                        cacheControl: '3600',
                        upsert: false
                    });

                if (uploadError) throw uploadError;

                // лЎңл”©л°” 50%лЎң м җн”„ (нҢҢмқј м „мҶЎ мҷ„лЈҢ лӢЁкі„)
                fill.style.width = '50%'; pText.innerText = '50%';

                // 2. нҢҢмқјмқҳ кіөк°ң URL к°Җм ёмҳӨкё°
                const { data: { publicUrl } } = _client.storage.from('videos').getPublicUrl(fileName);

                // 3. DB(posts)м—җ лҚ°мқҙн„° м ҖмһҘ
                const { error: dbError } = await _client.from('posts').insert([{
                    title: title,
                    video_url: publicUrl,
                    category: category,
                    author_id: myProfile.id,
                    likes: 0
                }]);

                if (dbError) throw dbError;

                // мҷ„лЈҢ!
                fill.style.width = '100%'; pText.innerText = '100%';
                showToast("м—…лЎңл“ң м„ұкіө! л©”мқёмңјлЎң мқҙлҸҷн•©лӢҲлӢӨ.");
                setTimeout(() => location.href = 'index.html', 1500);

            } catch (err) {
                console.error(err);
                alert("м—…лЎңл“ң мӢӨнҢЁ: " + err.message);
                btn.disabled = false;
                btn.innerText = "м—…лЎңл“ң мӢңмһ‘н•ҳкё°";
                progress.style.display = 'none';
            }
        }

        checkAuth();
    </script>
</body>
</html>
