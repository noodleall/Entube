<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entube - 프리미엄</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg-base: #f9fafb; --bg-surface: #ffffff; --bg-hover: #f3f4f6; 
            --text-primary: #111827; --text-secondary: #6b7280; 
            --brand-color: #2563eb; --divider: #e5e7eb; --danger: #ef4444;
            --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-base); color: var(--text-primary); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow-x: hidden; }
        * { box-sizing: border-box; }
        
        /* 헤더 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 32px; height: 72px; background: var(--bg-surface); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--divider); }
        .logo { font-size: 24px; font-weight: 800; cursor: pointer; }
        .logo span { color: var(--brand-color); }
        .header-right { display: flex; gap: 16px; align-items: center; }
        .btn-auth { background: var(--text-primary); color: white; border: none; padding: 10px 24px; border-radius: var(--radius-xl); font-weight: 600; }

        /* 레이아웃 */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 240px; padding: 24px 16px; background: var(--bg-surface); border-right: 1px solid var(--divider); }
        .content-area { flex: 1; overflow-y: auto; padding: 32px; }
        
        /* 영상 그리드 */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 32px; }
        .video-card { cursor: pointer; transition: 0.2s; }
        .video-card:hover { transform: translateY(-4px); }
        .thumbnail { width: 100%; aspect-ratio: 16/9; border-radius: var(--radius-lg); object-fit: cover; background: #000; }
        .meta { margin-top: 12px; display: flex; gap: 12px; }
        .meta h3 { margin: 0; font-size: 16px; font-weight: 700; }

        /* 📺 영상 확대 모달 (유튜브 스타일) */
        .player-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: flex-start; overflow-y: auto; padding: 40px 0; }
        .player-content { background: white; width: 90%; max-width: 1000px; border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 40px; }
        .video-wrapper video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }
        
        /* 💬 댓글 섹션 */
        .comment-section { padding: 32px; border-top: 1px solid var(--divider); }
        .comment-input-area { display: flex; gap: 12px; margin-bottom: 24px; }
        .comment-input-area input { flex: 1; padding: 12px; border: 1px solid var(--divider); border-radius: 8px; outline: none; }
        .comment-list { display: flex; flex-direction: column; gap: 16px; }
        .comment-item { display: flex; gap: 12px; font-size: 14px; }
        .comment-item b { font-weight: 700; }

        /* 일반 모달 (로그인 등) */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 4000; justify-content: center; align-items: center; }
        .modal-card { background: white; padding: 40px; border-radius: var(--radius-lg); width: 380px; }
        .input-group { margin-bottom: 16px; }
        .input-group input { width: 100%; padding: 14px; border: 1px solid var(--divider); border-radius: 8px; }
        .btn-primary { width: 100%; padding: 16px; background: var(--brand-color); color: white; border: none; border-radius: 8px; font-weight: 700; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" onclick="location.reload()">Entube<span>.</span></div>
        <div class="header-right" id="authSection">
            <button class="btn-auth" onclick="openModal('authModal')">시작하기</button>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div style="font-weight: 800; padding: 12px 16px;">홈</div>
            <div style="padding: 12px 16px; color: var(--text-secondary);">탐색</div>
        </aside>
        <main class="content-area">
            <div class="video-grid" id="videoGrid"></div>
        </main>
    </div>

    <div id="playerModal" class="player-modal" onclick="if(event.target==this) closePlayer()">
        <div class="player-content">
            <div class="video-wrapper">
                <video id="mainVideo" controls autoplay></video>
            </div>
            <div class="comment-section">
                <h3 id="playerTitle" style="margin-top:0;">영상 제목</h3>
                <hr style="border:0; border-top:1px solid var(--divider); margin: 20px 0;">
                <div class="comment-input-area">
                    <input type="text" id="commentInput" placeholder="댓글을 입력하세요...">
                    <button class="btn-auth" onclick="postComment()">등록</button>
                </div>
                <div id="commentList" class="comment-list">
                    </div>
            </div>
            <button onclick="closePlayer()" style="width:100%; padding:15px; background:#eee; border:none; font-weight:bold;">닫기</button>
        </div>
    </div>

    <div id="authModal" class="modal-overlay">
        <div class="modal-card">
            <h2 id="mTitle">로그인</h2>
            <div class="input-group"><input type="text" id="authId" placeholder="아이디"></div>
            <div class="input-group"><input type="password" id="authPw" placeholder="비밀번호"></div>
            <div class="input-group" id="nickG" style="display:none;"><input type="text" id="authNick" placeholder="닉네임"></div>
            <button class="btn-primary" onclick="handleAuth()">확인</button>
            <button onclick="isSignUp = !isSignUp; updateAuthUI();" style="background:none; border:none; color:blue; margin-top:10px; cursor:pointer;">회원가입/로그인 전환</button>
            <button onclick="closeModal('authModal')" style="display:block; margin:20px auto 0; border:none; background:none; color:#aaa;">취소</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://kzchubdwrkcpmuempgrg.supabase.co';
        const supabaseKey = 'sb_publishable_MyFF5Xln3fWLvTqMx2CFNA_obZtoask'; 
        const _client = window.supabase.createClient(supabaseUrl, supabaseKey);

        let myProfile = null;
        let isSignUp = false;
        let currentPostId = null;

        // 초기화
        async function init() {
            const { data: { session } } = await _client.auth.getSession();
            if (session) {
                const { data } = await _client.from('profiles').select('*').eq('id', session.user.id).single();
                myProfile = data;
            }
            renderHeader();
            loadVideos();
        }

        function renderHeader() {
            const area = document.getElementById('authSection');
            if (myProfile) {
                area.innerHTML = `<button class="btn-auth" onclick="location.href='upload.html'">업로드</button>
                                  <span style="font-weight:700; margin-left:10px;">${myProfile.nickname}님</span>
                                  <button onclick="_client.auth.signOut().then(()=>location.reload())" style="border:none; background:none; color:red; cursor:pointer;">로그아웃</button>`;
            } else {
                area.innerHTML = `<button class="btn-auth" onclick="openModal('authModal')">시작하기</button>`;
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function updateAuthUI() {
            document.getElementById('mTitle').innerText = isSignUp ? '회원가입' : '로그인';
            document.getElementById('nickG').style.display = isSignUp ? 'block' : 'none';
        }

        async function handleAuth() {
            const id = document.getElementById('authId').value;
            const pw = document.getElementById('authPw').value;
            const nick = document.getElementById('authNick').value;
            const email = `${id}@fake.com`;

            if (isSignUp) {
                const { data } = await _client.auth.signUp({ email, password: pw });
                if (data.user) await _client.from('profiles').update({ nickname: nick }).eq('id', data.user.id);
                alert("가입 완료! 로그인해줘."); location.reload();
            } else {
                const { error } = await _client.auth.signInWithPassword({ email, password: pw });
                if (error) alert("실패!"); else location.reload();
            }
        }

        async function loadVideos() {
            const { data: videos } = await _client.from('posts').select('*, profiles(nickname, avatar_url)').order('created_at', { ascending: false });
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';
            videos.forEach(v => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => openPlayer(v);
                card.innerHTML = `<video src="${v.video_url}" class="thumbnail"></video>
                                  <div class="meta"><h3>${v.title}</h3></div>`;
                grid.appendChild(card);
            });
        }

        // 📺 확대 및 댓글 불러오기
        async function openPlayer(video) {
            currentPostId = video.id;
            document.getElementById('playerModal').style.display = 'flex';
            document.getElementById('mainVideo').src = video.video_url;
            document.getElementById('playerTitle').innerText = video.title;
            loadComments(video.id);
        }

        function closePlayer() {
            document.getElementById('playerModal').style.display = 'none';
            document.getElementById('mainVideo').pause();
        }

        async function loadComments(postId) {
            const { data: comments } = await _client.from('comments').select('*, profiles(nickname)').eq('post_id', postId).order('created_at', { ascending: true });
            const list = document.getElementById('commentList');
            list.innerHTML = comments.length ? '' : '<p style="color:#aaa;">첫 댓글을 남겨보세요!</p>';
            comments.forEach(c => {
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = `<b>${c.profiles?.nickname || '익명'}:</b> <span>${c.content}</span>`;
                list.appendChild(div);
            });
        }

        async function postComment() {
            if (!myProfile) return alert("로그인해라!");
            const content = document.getElementById('commentInput').value;
            if (!content) return;

            const { error } = await _client.from('comments').insert([{
                post_id: currentPostId,
                author_id: myProfile.id,
                content: content
            }]);

            if (error) alert("실패!");
            else {
                document.getElementById('commentInput').value = '';
                loadComments(currentPostId);
            }
        }

        init();
    </script>
</body>
</html>
