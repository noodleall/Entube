<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entube - 프리미엄 마스터</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* [1] 전역 스타일 & 테마 */
        :root { 
            --bg-base: #f9fafb; --bg-surface: #ffffff; --bg-hover: #f3f4f6; 
            --text-primary: #111827; --text-secondary: #6b7280; 
            --brand-color: #2563eb; --divider: #e5e7eb; --danger: #ef4444;
            --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-base); color: var(--text-primary); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow-x: hidden; letter-spacing: -0.3px; }
        * { box-sizing: border-box; }
        button { cursor: pointer; transition: all 0.2s; border: none; font-family: inherit; }
        
        /* [2] 상단 헤더 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 32px; height: 72px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--divider); }
        .logo { font-size: 24px; font-weight: 800; color: var(--text-primary); cursor: pointer; letter-spacing: -1px; }
        .logo span { color: var(--brand-color); }
        .search-box { display: flex; width: 450px; background: var(--bg-base); border-radius: var(--radius-xl); overflow: hidden; border: 1px solid transparent; }
        .search-box:focus-within { border-color: var(--brand-color); background: white; }
        .search-box input { flex: 1; padding: 12px 20px; background: transparent; border: none; outline: none; font-size: 15px; }
        .header-right { display: flex; gap: 16px; align-items: center; }
        .btn-main { background: var(--brand-color); color: white; padding: 10px 24px; border-radius: var(--radius-xl); font-weight: 700; font-size: 14px; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 1px solid var(--divider); }

        /* [3] 메인 레이아웃 */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 240px; padding: 24px 16px; background: white; border-right: 1px solid var(--divider); }
        .sidebar-item { padding: 14px 20px; font-weight: 600; cursor: pointer; border-radius: var(--radius-md); margin-bottom: 4px; color: var(--text-secondary); }
        .sidebar-item.active { background: #eff6ff; color: var(--brand-color); }
        
        .content-area { flex: 1; overflow-y: auto; }
        .category-bar { display: flex; gap: 10px; padding: 16px 32px; background: white; border-bottom: 1px solid var(--divider); position: sticky; top: 0; z-index: 10; }
        .chip { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--divider); background: white; font-weight: 600; font-size: 14px; }
        .chip.active { background: var(--text-primary); color: white; border-color: var(--text-primary); }

        /* [4] 영상 그리드 (조회수 삭제됨) */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 32px; padding: 32px; }
        .video-card { cursor: pointer; transition: 0.2s; position: relative; }
        .video-card:hover { transform: translateY(-4px); }
        .thumbnail { width: 100%; aspect-ratio: 16/9; border-radius: var(--radius-lg); object-fit: cover; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .meta { margin-top: 14px; display: flex; gap: 12px; align-items: flex-start; }
        .meta-img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 1px solid var(--divider); }
        .meta-info h3 { margin: 0 0 4px 0; font-size: 15px; font-weight: 700; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .meta-info p { margin: 0; font-size: 13px; color: var(--text-secondary); }

        /* 🗑️ 삭제 버튼 스타일 */
        .btn-delete-small { position: absolute; top: 10px; right: 10px; background: rgba(239, 68, 68, 0.9); color: white; padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; z-index: 5; opacity: 0; transition: 0.2s; }
        .video-card:hover .btn-delete-small { opacity: 1; }

        /* [5] 📺 확대 플레이어 모달 (잘림 수정 완료) */
        .player-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 3000; justify-content: center; overflow-y: auto; padding: 40px 0; }
        .player-content { background: white; width: 95%; max-width: 1100px; border-radius: 20px; overflow: hidden; margin-bottom: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.3); }
        .video-wrapper video { width: 100% !important; height: auto; max-height: 75vh; background: #000; display: block; }
        .player-info { padding: 24px 32px; border-bottom: 1px solid var(--divider); display: flex; justify-content: space-between; align-items: center; }
        .player-title { font-size: 22px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        
        /* [6] 댓글 & 좋아요 */
        .btn-like { background: var(--bg-hover); padding: 10px 24px; border-radius: 24px; font-weight: 700; display: flex; align-items: center; gap: 8px; font-size: 15px; }
        .comment-area { padding: 32px; background: #fafafa; }
        .comment-input-box { display: flex; gap: 12px; margin-bottom: 32px; }
        .comment-input-box input { flex: 1; padding: 14px 20px; border: 1px solid var(--divider); border-radius: 12px; font-size: 14px; background: white; }
        .comment-list { display: flex; flex-direction: column; gap: 20px; }
        .comment-item { display: flex; gap: 12px; font-size: 14px; line-height: 1.5; }
        .comment-item b { color: var(--brand-color); }

        /* [7] 공통 모달 & 토스트 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 4000; justify-content: center; align-items: center; }
        .modal-card { background: white; padding: 40px; border-radius: 20px; width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .input-group { margin-bottom: 16px; text-align: left; }
        .input-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: var(--text-secondary); }
        .input-group input { width: 100%; padding: 14px; border: 1px solid var(--divider); border-radius: 12px; font-size: 15px; background: var(--bg-base); }
        .toast-container { position: fixed; bottom: 32px; right: 32px; z-index: 5000; display: flex; flex-direction: column; gap: 12px; }
        .toast { background: #111; color: white; padding: 16px 28px; border-radius: 12px; font-size: 14px; font-weight: 600; opacity: 0; transform: translateY(20px); transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <header class="header">
        <div class="logo" onclick="location.reload()">Entube<span>.</span></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="무엇을 시청하고 싶으신가요?" onkeypress="if(event.key==='Enter') loadVideos(this.value)">
        </div>
        <div class="header-right" id="authSection">
            <button class="btn-main" onclick="openModal('authModal')">시작하기</button>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-item active">홈</div>
            <div class="sidebar-item">탐색</div>
            <div class="sidebar-item">구독</div>
            <div style="height: 1px; background: var(--divider); margin: 20px 0;"></div>
            <div class="sidebar-item">보관함</div>
        </aside>
        <main class="content-area">
            <div class="category-bar">
                <button class="chip active" onclick="filterCat('전체', this)">전체</button>
                <button class="chip" onclick="filterCat('음악', this)">음악</button>
                <button class="chip" onclick="filterCat('게임', this)">게임</button>
                <button class="chip" onclick="filterCat('뉴스', this)">뉴스</button>
                <button class="chip" onclick="filterCat('교육', this)">교육</button>
            </div>
            <div class="video-grid" id="videoGrid"></div>
        </main>
    </div>

    <div id="playerModal" class="player-modal" onclick="if(event.target==this) closePlayer()">
        <div class="player-content">
            <div class="video-wrapper">
                <video id="mainVideo" controls autoplay></video>
            </div>
            <div class="player-info">
                <div>
                    <h2 id="playerTitle" class="player-title">제목</h2>
                    <p id="playerMeta" style="color:var(--text-secondary); margin:6px 0 0 0; font-size: 14px;">작성자</p>
                </div>
                <button class="btn-like" onclick="hitLike()">👍 <span id="likeCount">0</span></button>
            </div>
            <div class="comment-area">
                <div class="comment-input-box">
                    <input type="text" id="commentInput" placeholder="댓글을 입력해 보세요...">
                    <button class="btn-main" onclick="postComment()">등록</button>
                </div>
                <div id="commentList" class="comment-list"></div>
            </div>
            <button onclick="closePlayer()" style="width:100%; padding:20px; border:none; background:#f3f4f6; font-weight:800; font-size:15px; cursor:pointer;">닫기</button>
        </div>
    </div>

    <div id="authModal" class="modal-overlay">
        <div class="modal-card">
            <h2 id="mTitle" style="margin-bottom:8px;">환영합니다</h2>
            <p id="mDesc" style="color:var(--text-secondary); font-size:14px; margin-bottom:32px;">서비스를 이용하려면 로그인해 주세요.</p>
            <div class="input-group"><input type="text" id="authId" placeholder="아이디"></div>
            <div class="input-group"><input type="password" id="authPw" placeholder="비밀번호 (6자 이상)"></div>
            <div class="input-group" id="nickG" style="display:none;"><input type="text" id="authNick" placeholder="닉네임"></div>
            <button class="btn-main" style="width:100%; padding:16px; font-size:16px; margin-top:10px;" onclick="executeAuth()">확인</button>
            <button onclick="isSignUp = !isSignUp; updateAuthUI();" style="background:none; color:var(--brand-color); margin-top:20px; font-weight:700; font-size:13px; text-decoration:underline;">회원가입 / 로그인 전환</button>
            <button onclick="closeModal('authModal')" style="display:block; margin:20px auto 0; background:none; color:#aaa; font-size:13px;">나중에 하기</button>
        </div>
    </div>

    <div id="profileModal" class="modal-overlay">
        <div class="modal-card">
            <h2>내 프로필 설정</h2>
            <p style="color:var(--text-secondary); font-size:14px; margin-bottom:32px;">채널 이름을 자유롭게 변경하세요.</p>
            <div class="input-group">
                <label>새 닉네임</label>
                <input type="text" id="newNick" placeholder="닉네임을 입력하세요">
            </div>
            <button class="btn-main" style="width:100%; padding:16px;" onclick="updateNick()">변경사항 저장</button>
            <button onclick="closeModal('profileModal')" style="background:none; color:#aaa; margin-top:20px; font-size:13px;">취소</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://kzchubdwrkcpmuempgrg.supabase.co';
        const supabaseKey = 'sb_publishable_MyFF5Xln3fWLvTqMx2CFNA_obZtoask'; 
        const _client = window.supabase.createClient(supabaseUrl, supabaseKey);

        let myProfile = null;
        let isSignUp = false;
        let currentVideo = null;
        let currentCat = '전체';
        const defaultPfp = 'https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png';

        function escapeHTML(str) { return str ? String(str).replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t)) : ''; }
        
        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(()=>t.classList.add('show'), 10);
            setTimeout(()=>{t.classList.remove('show'); setTimeout(()=>t.remove(), 300);}, 3000);
        }

        async function init() {
            const { data: { session } } = await _client.auth.getSession();
            if (session) {
                const { data } = await _client.from('profiles').select('*').eq('id', session.user.id).single();
                myProfile = data || { id: session.user.id, nickname: '익명', avatar_url: defaultPfp };
            } else { myProfile = null; }
            renderHeader();
            loadVideos();
        }

        function renderHeader() {
            const area = document.getElementById('authSection');
            if (myProfile) {
                area.innerHTML = `
                    <button class="btn-main" style="background:var(--bg-hover); color:var(--text-primary); margin-right:8px;" onclick="location.href='upload.html'">업로드</button>
                    <div style="display:flex; align-items:center; gap:12px; margin-left:8px; cursor:pointer;" onclick="openModal('profileModal')">
                        <img src="${myProfile.avatar_url || defaultPfp}" class="profile-img">
                        <div style="display:flex; flex-direction:column;">
                            <span style="font-weight:800; font-size:14px;">${escapeHTML(myProfile.nickname)}</span>
                            <button onclick="event.stopPropagation(); _client.auth.signOut().then(()=>location.reload())" style="background:none; color:var(--danger); font-weight:700; font-size:11px; padding:0; text-align:left;">로그아웃</button>
                        </div>
                    </div>`;
            } else {
                area.innerHTML = `<button class="btn-main" onclick="openModal('authModal')">시작하기</button>`;
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function updateAuthUI() {
            document.getElementById('mTitle').innerText = isSignUp ? '새로운 시작' : '환영합니다';
            document.getElementById('mDesc').innerText = isSignUp ? '닉네임만 정하면 가입 끝!' : '아이디와 비밀번호를 입력해 주세요.';
            document.getElementById('nickG').style.display = isSignUp ? 'block' : 'none';
        }

        async function executeAuth() {
            const id = document.getElementById('authId').value.trim();
            const pw = document.getElementById('authPw').value.trim();
            const nick = document.getElementById('authNick').value.trim();
            const email = `${id}@entubefake.com`;

            if (!id || !pw) return showToast("모든 정보를 입력해 주세요!");

            try {
                if (isSignUp) {
                    if (!nick) return showToast("닉네임을 입력해 주세요!");
                    const { data, error } = await _client.auth.signUp({ email, password: pw });
                    if (error) throw error;
                    if (data.user) await _client.from('profiles').update({ nickname: nick }).eq('id', data.user.id);
                    showToast("가입 완료! 로그인해 보세요."); location.reload();
                } else {
                    const { error } = await _client.auth.signInWithPassword({ email, password: pw });
                    if (error) throw new Error("아이디나 비밀번호가 틀렸습니다.");
                    location.reload();
                }
            } catch(e) { alert(e.message); }
        }

        async function updateNick() {
            const nick = document.getElementById('newNick').value.trim();
            if(!nick) return showToast("닉네임을 입력해 주세요!");
            const { error } = await _client.from('profiles').update({ nickname: nick }).eq('id', myProfile.id);
            if(!error) { showToast("닉네임 변경 성공!"); location.reload(); }
            else showToast("변경 실패!");
        }

        async function loadVideos(search = '') {
            let q = _client.from('posts').select('*, profiles(nickname, avatar_url)').order('created_at', {ascending: false});
            if (currentCat !== '전체') q = q.eq('category', currentCat);
            if (search) q = q.ilike('title', `%${search}%`);
            
            const { data: videos } = await q;
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';
            
            if(!videos || videos.length === 0) {
                grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; padding:50px; color:#aaa;">등록된 영상이 없습니다.</p>`;
                return;
            }

            videos.forEach(v => {
                const isMine = myProfile && myProfile.id === v.author_id;
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div style="position:relative;">
                        <video src="${v.video_url}" class="thumbnail" onclick='openPlayer(${JSON.stringify(v).replace(/'/g, "&apos;")})'></video>
                        ${isMine ? `<button class="btn-delete-small" onclick="event.stopPropagation(); deletePost('${v.id}')">삭제</button>` : ''}
                    </div>
                    <div class="meta" onclick='openPlayer(${JSON.stringify(v).replace(/'/g, "&apos;")})'>
                        <img src="${v.profiles?.avatar_url || defaultPfp}" class="meta-img">
                        <div class="meta-info">
                            <h3>${escapeHTML(v.title)}</h3>
                            <p>${escapeHTML(v.profiles?.nickname)} • 👍 ${v.likes || 0}</p>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        async function deletePost(postId) {
            if(!confirm("이 영상을 정말 삭제하시겠습니까?")) return;
            const { error } = await _client.from('posts').delete().eq('id', postId);
            if(error) alert("삭제 권한이 없거나 오류가 발생했습니다.");
            else { showToast("삭제되었습니다."); loadVideos(); }
        }

        function filterCat(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            loadVideos();
        }

        function openPlayer(v) {
            currentVideo = v;
            document.getElementById('playerModal').style.display = 'flex';
            const vid = document.getElementById('mainVideo');
            vid.src = v.video_url;
            vid.play();
            document.getElementById('playerTitle').innerText = escapeHTML(v.title);
            document.getElementById('playerMeta').innerText = `${escapeHTML(v.profiles?.nickname)} 님이 공유함`;
            document.getElementById('likeCount').innerText = v.likes || 0;
            loadComments(v.id);
        }

        function closePlayer() { 
            document.getElementById('playerModal').style.display = 'none'; 
            document.getElementById('mainVideo').pause(); 
        }

        async function hitLike() {
            if(!myProfile) return showToast("로그인 후 좋아요를 눌러주세요!");
            const newLikes = (currentVideo.likes || 0) + 1;
            await _client.from('posts').update({ likes: newLikes }).eq('id', currentVideo.id);
            document.getElementById('likeCount').innerText = newLikes;
            currentVideo.likes = newLikes;
            loadVideos(document.getElementById('searchInput').value); // 메인 리스트 갱신
        }

        async function loadComments(postId) {
            const { data: comments } = await _client.from('comments').select('*, profiles(nickname)').eq('post_id', postId).order('created_at', {ascending: true});
            const list = document.getElementById('commentList');
            list.innerHTML = '';
            if(!comments || comments.length === 0) {
                list.innerHTML = '<p style="color:#aaa; font-size:13px;">아직 댓글이 없습니다. 첫 마디를 남겨보세요!</p>';
                return;
            }
            comments.forEach(c => {
                const d = document.createElement('div');
                d.className = 'comment-item';
                d.innerHTML = `<b>${escapeHTML(c.profiles?.nickname)}:</b> <span>${escapeHTML(c.content)}</span>`;
                list.appendChild(d);
            });
        }

        async function postComment() {
            if(!myProfile) return showToast("로그인이 필요한 서비스입니다!");
            const content = document.getElementById('commentInput').value.trim();
            if(!content) return;
            
            const { error } = await _client.from('comments').insert([{ 
                post_id: currentVideo.id, 
                author_id: myProfile.id, 
                content: content 
            }]);

            if(error) alert("댓글 작성 실패: " + error.message);
            else { 
                document.getElementById('commentInput').value = ''; 
                loadComments(currentVideo.id); 
                showToast("댓글 등록 성공! 👍");
            }
        }

        // 초기 구동
        init();
    </script>
</body>
</html>
