<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entube - 프리미엄 서비스</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* [1] 프리미엄 디자인 시스템 */
        :root { 
            --primary: #2563eb; --primary-soft: #eff6ff;
            --bg-base: #f9fafb; --bg-card: #ffffff;
            --text-main: #111827; --text-sub: #6b7280;
            --divider: #e5e7eb; --danger: #ef4444;
            --radius-xl: 24px; --radius-lg: 16px; --radius-md: 12px;
            --shadow: 0 10px 25px rgba(0,0,0,0.03);
        }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-base); color: var(--text-main); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; letter-spacing: -0.4px; }
        button { cursor: pointer; transition: 0.2s; border: none; font-family: inherit; }
        
        /* [2] 상단 헤더 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 32px; height: 72px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--divider); }
        .logo { font-size: 24px; font-weight: 900; color: var(--text-main); cursor: pointer; letter-spacing: -1.2px; text-decoration: none; }
        .logo span { color: var(--primary); }
        .search-box { display: flex; background: var(--bg-base); border-radius: 30px; overflow: hidden; border: 1.5px solid transparent; width: 450px; }
        .search-box:focus-within { border-color: var(--primary); background: #fff; }
        .search-box input { flex: 1; padding: 12px 24px; background: transparent; border: none; outline: none; }
        .header-right { display: flex; gap: 16px; align-items: center; }

        /* [3] 앱 레이아웃 */
        .app-body { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 240px; padding: 24px 16px; background: #fff; border-right: 1px solid var(--divider); }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; font-weight: 600; color: var(--text-sub); border-radius: var(--radius-md); cursor: pointer; margin-bottom: 4px; }
        .menu-item.active { background: var(--primary-soft); color: var(--primary); }
        
        .main-content { flex: 1; overflow-y: auto; background: var(--bg-base); scroll-behavior: smooth; }
        .cat-bar { display: flex; gap: 10px; padding: 16px 32px; background: #fff; border-bottom: 1px solid var(--divider); position: sticky; top: 0; z-index: 10; overflow-x: auto; scrollbar-width: none; }
        .chip { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--divider); background: #fff; font-weight: 600; font-size: 14px; white-space: nowrap; transition: 0.2s; }
        .chip.active { background: #111; color: #fff; border-color: #111; }

        /* [4] 영상 그리드 시스템 */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 32px; padding: 32px; }
        .video-card { cursor: pointer; transition: 0.3s; position: relative; }
        .thumb-wrap { width: 100%; aspect-ratio: 16/9; border-radius: var(--radius-lg); overflow: hidden; background: #000; position: relative; box-shadow: var(--shadow); }
        .thumb-wrap video { width: 100%; height: 100%; object-fit: cover; }
        .btn-delete-float { position: absolute; top: 12px; right: 12px; background: rgba(239, 68, 68, 0.9); color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; opacity: 0; transition: 0.2s; z-index: 10; }
        .video-card:hover .btn-delete-float { opacity: 1; }
        .video-card:hover .thumb-wrap { transform: translateY(-4px); }
        
        .meta-info { display: flex; gap: 12px; margin-top: 14px; }
        .meta-info img { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #eee; }
        .meta-info h3 { margin: 0 0 4px 0; font-size: 15.5px; font-weight: 700; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .meta-info p { margin: 0; font-size: 13px; color: var(--text-sub); }

        /* [5] 🚨 플레이어 모달 (잘림 방지 초필살기) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 3000; justify-content: center; align-items: center; padding: 20px; }
        .modal-body { 
            background: #fff; 
            width: 100%; 
            max-width: 1100px; 
            max-height: 95vh; 
            border-radius: 24px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .vid-frame { width: 100%; background: #000; flex-shrink: 0; }
        .vid-frame video { 
            width: 100% !important; 
            max-height: 60vh; /* 영상 높이 60% 제한 - 제목/댓글 안 잘리게! */
            display: block; 
            object-fit: contain; 
        }
        .scroll-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 32px 40px; 
            background: #fff;
        }
        .vid-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
        .btn-sub { background: #111; color: #fff; padding: 12px 26px; border-radius: 30px; font-weight: 700; font-size: 14px; }
        .btn-sub.active { background: #eee; color: #666; }
        
        /* [6] 댓글 & 토스트 */
        .cmt-box { display: flex; gap: 12px; margin-bottom: 32px; }
        .cmt-box input { flex: 1; padding: 14px 20px; border: 1.5px solid var(--divider); border-radius: 12px; outline: none; }
        .cmt-box input:focus { border-color: var(--primary); }
        .cmt-list-item { margin-bottom: 20px; line-height: 1.5; font-size: 14.5px; }
        .cmt-list-item b { color: var(--primary); }

        .toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 5000; }
        .toast { background: #111; color: #fff; padding: 16px 28px; border-radius: 12px; margin-top: 10px; opacity: 0; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .toast.show { opacity: 1; transform: translateY(-10px); }
    </style>
</head>
<body>
    <div id="toastBox" class="toast-container"></div>

    <header class="header">
        <a href="#" class="logo" onclick="location.reload()">En<span>tube.</span></a>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="검색어를 입력하세요" onkeypress="if(event.key==='Enter') searchPosts()">
            <button onclick="searchPosts()" style="background:none; font-weight:800; color:var(--text-sub);">검색</button>
        </div>
        <div class="header-right" id="headerAuth"></div>
    </header>

    <div class="app-body">
        <aside class="sidebar">
            <div class="menu-item active" id="m-home" onclick="nav('home')">🏠 홈</div>
            <div class="sidebar-item" style="padding:14px 20px; font-size:12px; color:#aaa; font-weight:800;">내 보관함</div>
            <div class="menu-item" id="m-sub" onclick="nav('sub')">🔔 구독 중</div>
            <div class="menu-item" id="m-mine" onclick="nav('mine')">👤 내 영상 관리</div>
            <div style="height: 1px; background: var(--divider); margin: 20px 0;"></div>
            <div id="userCustomCats" style="padding: 0 20px; font-size:13px; color:#aaa;"></div>
        </aside>

        <main class="main-content">
            <div class="cat-bar" id="catBar"></div>
            <div class="video-grid" id="vGrid"></div>
        </main>
    </div>

    <div id="playerModal" class="modal" onclick="if(event.target==this) closePlayer()">
        <div class="modal-body">
            <div class="vid-frame">
                <video id="pVid" controls autoplay></video>
            </div>
            <div class="scroll-area">
                <div class="vid-header">
                    <div>
                        <h2 id="vTitle" style="margin:0 0 12px 0; font-size:24px; letter-spacing:-0.5px;">영상 제목</h2>
                        <div style="display:flex; align-items:center; gap:12px;">
                            <img id="cImg" src="" style="width:44px; height:44px; border-radius:50%; border:1px solid #eee;">
                            <div>
                                <div id="cNick" style="font-weight:800; font-size:16px;">작성자 닉네임</div>
                                <div style="font-size:12px; color:var(--text-sub);">구독자 0명</div>
                            </div>
                            <button id="subBtn" class="btn-sub" onclick="handleSub()">구독</button>
                        </div>
                    </div>
                    <div style="display:flex; gap:12px;">
                        <button onclick="handleLike()" style="background:var(--bg-base); padding:12px 24px; border-radius:30px; font-weight:800; display:flex; align-items:center; gap:8px;">👍 <span id="lCount">0</span></button>
                        <button onclick="closePlayer()" style="background:#eee; padding:12px; border-radius:50%; font-weight:900;">✕</button>
                    </div>
                </div>
                <div class="cmt-box">
                    <input type="text" id="cInput" placeholder="댓글을 입력해 보세요...">
                    <button onclick="sendCmt()" style="background:var(--primary); color:#fff; padding:0 24px; border-radius:12px; font-weight:800;">등록</button>
                </div>
                <div id="cList"></div>
            </div>
            <button onclick="closePlayer()" style="width:100%; padding:18px; border:none; background:#f3f4f6; font-weight:800; font-size:15px; cursor:pointer;">화면 닫기</button>
        </div>
    </div>

    <div id="authPopup" class="modal" style="background:rgba(0,0,0,0.5);">
        <div style="background:#fff; padding:48px 40px; border-radius:24px; width:400px; text-align:center;">
            <h2 id="at">로그인</h2>
            <p id="ad" style="color:var(--text-sub); margin-bottom:30px;">아이디와 비밀번호를 입력하세요.</p>
            <input type="text" id="ui" placeholder="아이디" style="width:100%; padding:15px; margin-bottom:12px; border-radius:12px; border:1.5px solid #eee; outline:none;">
            <input type="password" id="up" placeholder="비밀번호" style="width:100%; padding:15px; margin-bottom:12px; border-radius:12px; border:1.5px solid #eee; outline:none;">
            <input type="text" id="un" placeholder="가입할 닉네임" style="width:100%; padding:15px; margin-bottom:20px; border-radius:12px; border:1.5px solid #eee; outline:none; display:none;">
            <button onclick="doAuth()" style="width:100%; padding:18px; background:var(--primary); color:#fff; border-radius:12px; font-weight:800; font-size:16px;">확인</button>
            <button onclick="isJ=!isJ; document.getElementById('at').innerText=isJ?'회원가입':'로그인'; document.getElementById('un').style.display=isJ?'block':'none';" style="margin-top:20px; background:none; color:var(--primary); font-weight:700; text-decoration:underline;">계정이 없으신가요?</button>
            <button onclick="closePlayer()" style="display:block; margin:20px auto 0; background:none; color:#aaa; font-size:13px;">나중에 하기</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://kzchubdwrkcpmuempgrg.supabase.co';
        const supabaseKey = 'sb_publishable_MyFF5Xln3fWLvTqMx2CFNA_obZtoask'; 
        const _client = window.supabase.createClient(supabaseUrl, supabaseKey);

        let my=null, isJ=false, nowV=null, nowM='home', nowC='전체', myS=[];
        const dp='https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png';

        function safe(s){return s?String(s).replace(/[&<>'"]/g,t=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[t]||t)):'' }
        function toast(m){const b=document.getElementById('toastBox'),t=document.createElement('div');t.className='toast';t.innerText=m;b.appendChild(t);setTimeout(()=>t.classList.add('show'),10);setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300)},3000)}
        
        async function boot(){
            const {data:{session}} = await _client.auth.getSession();
            if(session){
                const {data} = await _client.from('profiles').select('*').eq('id', session.user.id).single();
                my = data; await fetchS();
            }
            drawH(); 
            await loadC(); // 카테고리 먼저 불러오기
            drawV();
        }

        async function fetchS(){ const {data}=await _client.from('subscriptions').select('creator_id').eq('subscriber_id', my.id); myS=data.map(s=>s.creator_id); }

        function drawH(){
            const a=document.getElementById('headerAuth');
            if(my){
                a.innerHTML = `<button onclick="location.href='upload.html'" style="background:var(--primary); color:#fff; padding:10px 22px; border-radius:24px; font-weight:800; font-size:14px; margin-right:12px;">업로드</button>
                               <div style="display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="toast('반가워요, '+my.nickname+'님!')">
                                   <img src="${my.avatar_url||dp}" style="width:38px; height:38px; border-radius:50%; border:1px solid #eee;">
                                   <div style="display:flex; flex-direction:column;"><b style="font-size:14px;">${my.nickname}</b><button onclick="event.stopPropagation(); _client.auth.signOut().then(()=>location.reload())" style="background:none; color:red; font-size:11px; padding:0; text-align:left; font-weight:700;">로그아웃</button></div>
                               </div>`;
            } else { a.innerHTML = `<button onclick="document.getElementById('authPopup').style.display='flex'" style="background:#111; color:#fff; padding:10px 24px; border-radius:24px; font-weight:800; font-size:14px;">시작하기</button>`; }
        }

        async function doAuth(){
            const i=document.getElementById('ui').value, p=document.getElementById('up').value, n=document.getElementById('un').value, e=`${i}@entubefake.com`;
            if(isJ){
                const {data, error}=await _client.auth.signUp({email:e, password:p});
                if(error) return alert(error.message);
                await _client.from('profiles').update({nickname:n}).eq('id',data.user.id);
                location.reload();
            } else {
                const {error}=await _client.auth.signInWithPassword({email:e, password:p});
                if(error) alert("실패!"); else location.reload();
            }
        }

        // 🚀 빤쭌이가 입력한 카테고리들 실시간으로 불러와서 상단바에 뿌리기
        async function loadC(){
            const {data}=await _client.from('posts').select('category');
            // '전체' + DB에 있는 카테고리 중복 제거해서 정렬
            const items=['전체', ...new Set(data.map(v=>v.category || '기타'))].sort();
            const bar=document.getElementById('catBar');
            bar.innerHTML = items.map(c=>`<button class="chip ${nowC===c?'active':''}" onclick="nowC='${c}';loadC();drawV();">${c}</button>`).join('');
        }

        function nav(m){ nowM=m; document.querySelectorAll('.menu-item').forEach(e=>e.classList.remove('active')); document.getElementById('m-'+m).classList.add('active'); drawV(); }

        async function drawV(search=''){
            let q=_client.from('posts').select('*, profiles(nickname, avatar_url)').order('created_at',{ascending:false});
            if(nowM==='sub'){ if(!my)return toast("로그인 하세요!"); q=q.in('author_id', myS); }
            else if(nowM==='mine'){ if(!my)return toast("로그인 하세요!"); q=q.eq('author_id', my.id); }
            
            if(nowC!=='전체') q=q.eq('category', nowC);
            if(search) q=q.ilike('title', `%${search}%`);

            const {data:list}=await q;
            const g=document.getElementById('vGrid'); g.innerHTML='';
            
            if(!list?.length) return g.innerHTML=`<p style="grid-column:1/-1; text-align:center; padding:100px; color:#aaa;">영상이 없습니다.</p>`;

            list.forEach(v=>{
                const card=document.createElement('div'); card.className='video-card';
                card.innerHTML=`<div class="thumb-wrap"><video src="${v.video_url}" onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0;" muted loop></video>${my&&my.id===v.author_id?`<button class="btn-delete-float" onclick="event.stopPropagation();kill('${v.id}')">삭제</button>`:''}</div>
                                <div class="meta-info" onclick='openP(${JSON.stringify(v).replace(/'/g, "&apos;")})'>
                                    <img src="${v.profiles?.avatar_url||dp}">
                                    <div><h3>${safe(v.title)}</h3><p>${safe(v.profiles?.nickname)} • 👍 ${v.likes||0}</p></div>
                                </div>`;
                g.appendChild(card);
            });
        }

        async function kill(id){ if(confirm("진짜 삭제할까요?")){ await _client.from('posts').delete().eq('id',id); loadC(); drawV(); } }

        function openP(v){
            nowV=v; document.getElementById('playerModal').style.display='flex';
            document.getElementById('pVid').src=v.video_url;
            document.getElementById('vTitle').innerText=safe(v.title);
            document.getElementById('cNick').innerText=safe(v.profiles?.nickname);
            document.getElementById('cImg').src=v.profiles?.avatar_url||dp;
            document.getElementById('lCount').innerText=v.likes||0;
            const b=document.getElementById('subBtn');
            if(my&&my.id===v.author_id) b.style.display='none';
            else { b.style.display='block'; const s=myS.includes(v.author_id); b.innerText=s?"구독 중":"구독"; b.className=s?"btn-sub active":"btn-sub"; }
            fetchC(v.id);
        }

        function closePlayer(){ document.getElementById('playerModal').style.display='none'; document.getElementById('pVid').pause(); }

        async function handleLike(){ if(!my)return toast("로그인 하세요!"); const n=(nowV.likes||0)+1; await _client.from('posts').update({likes:n}).eq('id',nowV.id); document.getElementById('lCount').innerText=n; nowV.likes=n; drawV(); }

        async function handleSub(){
            if(!my)return toast("로그인 하세요!"); const cid=nowV.author_id;
            if(myS.includes(cid)) await _client.from('subscriptions').delete().eq('subscriber_id',my.id).eq('creator_id',cid);
            else await _client.from('subscriptions').insert([{subscriber_id:my.id, creator_id:cid}]);
            await fetchS(); openP(nowV);
        }

        async function fetchC(pid){
            const {data}=await _client.from('comments').select('*, profiles(nickname)').eq('post_id', pid).order('created_at', {ascending: true});
            const l=document.getElementById('cList');
            l.innerHTML = data?.length ? '' : '<p style="color:#aaa; font-size:13px;">첫 댓글을 남겨보세요!</p>';
            data?.forEach(c => {
                const div = document.createElement('div'); div.className = 'cmt-list-item';
                div.innerHTML = `<b>${safe(c.profiles?.nickname)}:</b> <span>${safe(c.content)}</span>`;
                l.appendChild(div);
            });
        }

        async function sendCmt(){
            if(!my)return toast("로그인 하세요!");
            const c=document.getElementById('cInput').value.trim(); if(!c)return;
            const {error}=await _client.from('comments').insert([{post_id:nowV.id, author_id:my.id, content:c}]);
            if(!error){ document.getElementById('cInput').value=''; fetchC(nowV.id); }
        }

        function searchPosts() { drawV(document.getElementById('searchInput').value.trim()); }

        boot();
    </script>
</body>
</html>
