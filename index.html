<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Entube - 프리미엄 마스터</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* [기존 스타일 유지] */
        :root { --bg-base: #f9fafb; --bg-surface: #ffffff; --text-primary: #111827; --brand-color: #2563eb; --divider: #e5e7eb; --radius-lg: 16px; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-base); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow-x: hidden; }
        button { cursor: pointer; transition: 0.2s; border: none; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 32px; height: 72px; background: white; border-bottom: 1px solid var(--divider); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 800; cursor: pointer; }
        .logo span { color: var(--brand-color); }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 240px; padding: 24px 16px; background: white; border-right: 1px solid var(--divider); }
        .sidebar-item { padding: 14px 20px; font-weight: 600; cursor: pointer; border-radius: 12px; margin-bottom: 4px; color: #666; }
        .sidebar-item.active { background: #eff6ff; color: var(--brand-color); }
        .content-area { flex: 1; overflow-y: auto; }
        .category-bar { display: flex; gap: 10px; padding: 16px 32px; background: white; border-bottom: 1px solid var(--divider); position: sticky; top: 0; z-index: 10; overflow-x: auto; }
        .chip { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--divider); background: white; font-weight: 600; white-space: nowrap; }
        .chip.active { background: #111; color: white; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 32px; padding: 32px; }
        .video-card { cursor: pointer; position: relative; }
        .thumbnail { width: 100%; aspect-ratio: 16/9; border-radius: 16px; object-fit: cover; background: #000; }
        .player-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; overflow-y: auto; padding: 40px 0; }
        .player-content { background: white; width: 95%; max-width: 1100px; border-radius: 20px; overflow: hidden; }
        .video-wrapper video { width: 100%; max-height: 70vh; background: #000; display: block; }
        .player-info { padding: 24px 32px; border-bottom: 1px solid var(--divider); display: flex; justify-content: space-between; align-items: center; }
        .btn-sub { background: #111; color: white; padding: 10px 20px; border-radius: 20px; font-weight: 700; font-size: 14px; }
        .btn-sub.active { background: #eee; color: #666; }
        .toast-container { position: fixed; bottom: 32px; right: 32px; z-index: 5000; }
        .toast { background: #111; color: white; padding: 16px 24px; border-radius: 12px; opacity: 0; transition: 0.3s; margin-top: 10px; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div id="toastContainer" class="toast-container"></div>
    <header class="header">
        <div class="logo" onclick="location.reload()">Entube<span>.</span></div>
        <div class="header-right" id="authSection"></div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-item active" id="menuHome" onclick="changeMenu('home')">🏠 홈</div>
            <div class="sidebar-item" id="menuSub" onclick="changeMenu('sub')">🔔 구독 중</div>
            <div style="height: 1px; background: #eee; margin: 20px 0;"></div>
            <div id="myCategoryList"></div>
        </aside>
        <main class="content-area">
            <div class="category-bar" id="categoryBar"></div>
            <div class="video-grid" id="videoGrid"></div>
        </main>
    </div>

    <div id="playerModal" class="player-modal" onclick="if(event.target==this) closePlayer()">
        <div class="player-content">
            <video id="mainVideo" controls autoplay></video>
            <div class="player-info">
                <div>
                    <h2 id="playerTitle" style="margin:0;">제목</h2>
                    <p id="playerMeta" style="color:#666; margin:4px 0 0 0;">작성자</p>
                </div>
                <div style="display:flex; gap:12px; align-items:center;">
                    <button class="btn-sub" id="subBtn" onclick="toggleSubscribe()">구독</button>
                    <button onclick="hitLike()" style="background:#f3f4f6; padding:10px 20px; border-radius:20px; font-weight:bold;">👍 <span id="likeCount">0</span></button>
                </div>
            </div>
            <div style="padding:24px 32px; background:#fafafa;" id="commentArea">
                <input type="text" id="commentInput" placeholder="댓글 달기..." style="width:80%; padding:10px; border-radius:8px; border:1px solid #ddd;">
                <button onclick="postComment()" style="padding:10px 20px; background:#2563eb; color:white; border-radius:8px; margin-left:10px;">등록</button>
                <div id="commentList" style="margin-top:20px;"></div>
            </div>
            <button onclick="closePlayer()" style="width:100%; padding:15px; border:none; background:#eee; font-weight:bold;">닫기</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://kzchubdwrkcpmuempgrg.supabase.co';
        const supabaseKey = 'sb_publishable_MyFF5Xln3fWLvTqMx2CFNA_obZtoask'; 
        const _client = window.supabase.createClient(supabaseUrl, supabaseKey);

        let myProfile = null;
        let currentMenu = 'home'; 
        let currentCat = '전체';
        let currentVideo = null;
        let mySubscriptions = []; // 내가 구독한 사람 리스트

        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(()=>t.classList.add('show'), 10);
            setTimeout(()=>{t.classList.remove('show'); setTimeout(()=>t.remove(), 300);}, 3000);
        }

        async function init() {
            const { data: { session } } = await _client.auth.getSession();
            if (session) {
                const { data } = await _client.from('profiles').select('*').eq('id', session.user.id).single();
                myProfile = data;
                await loadMySubs();
            }
            renderHeader();
            loadCategories();
            loadVideos();
        }

        async function loadMySubs() {
            const { data } = await _client.from('subscriptions').select('creator_id').eq('subscriber_id', myProfile.id);
            mySubscriptions = data.map(s => s.creator_id);
        }

        function renderHeader() {
            const area = document.getElementById('authSection');
            if (myProfile) {
                area.innerHTML = `<button onclick="location.href='upload.html'" style="background:#2563eb; color:white; padding:8px 16px; border-radius:20px; font-weight:bold; margin-right:15px;">업로드</button>
                                  <b>${myProfile.nickname}님</b>`;
            } else {
                area.innerHTML = `<button onclick="alert('로그인 기능은 아까랑 똑같아!')">로그인</button>`;
            }
        }

        // 🚀 카테고리 동적으로 불러오기 (자기가 정한 것들)
        async function loadCategories() {
            const { data } = await _client.from('posts').select('category');
            const cats = ['전체', ...new Set(data.map(v => v.category))];
            const bar = document.getElementById('categoryBar');
            bar.innerHTML = cats.map(c => `<button class="chip ${currentCat===c?'active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
        }

        function setCat(c) { currentCat = c; loadCategories(); loadVideos(); }

        function changeMenu(m) {
            currentMenu = m;
            document.getElementById('menuHome').classList.toggle('active', m === 'home');
            document.getElementById('menuSub').classList.toggle('active', m === 'sub');
            loadVideos();
        }

        async function loadVideos() {
            let q = _client.from('posts').select('*, profiles(nickname, avatar_url)').order('created_at', {ascending: false});
            
            if (currentMenu === 'sub') {
                if (!myProfile) return alert("로그인해야 구독함을 볼 수 있어!");
                if (mySubscriptions.length === 0) {
                    document.getElementById('videoGrid').innerHTML = "<p style='padding:40px;'>구독 중인 채널이 없습니다.</p>";
                    return;
                }
                q = q.in('author_id', mySubscriptions);
            }
            if (currentCat !== '전체') q = q.eq('category', currentCat);

            const { data: videos } = await q;
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = videos.map(v => `
                <div class="video-card" onclick='openPlayer(${JSON.stringify(v).replace(/'/g, "&apos;")})'>
                    <video src="${v.video_url}" class="thumbnail"></video>
                    <div style="display:flex; gap:12px; margin-top:12px;">
                        <img src="${v.profiles?.avatar_url || ''}" style="width:36px; height:36px; border-radius:50%;">
                        <div>
                            <h3 style="margin:0; font-size:15px;">${v.title}</h3>
                            <p style="margin:4px 0; font-size:13px; color:#666;">${v.profiles?.nickname} • 👍 ${v.likes}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function openPlayer(v) {
            currentVideo = v;
            document.getElementById('playerModal').style.display = 'flex';
            document.getElementById('mainVideo').src = v.video_url;
            document.getElementById('playerTitle').innerText = v.title;
            document.getElementById('playerMeta').innerText = v.profiles?.nickname;
            document.getElementById('likeCount').innerText = v.likes;
            
            // 구독 버튼 상태 확인
            const btn = document.getElementById('subBtn');
            if (myProfile && myProfile.id === v.author_id) {
                btn.style.display = 'none';
            } else {
                btn.style.display = 'block';
                const isSub = mySubscriptions.includes(v.author_id);
                btn.innerText = isSub ? "구독 중" : "구독";
                btn.className = isSub ? "btn-sub active" : "btn-sub";
            }
            loadComments(v.id);
        }

        async function toggleSubscribe() {
            if (!myProfile) return alert("로그인해!");
            const creatorId = currentVideo.author_id;
            const isSub = mySubscriptions.includes(creatorId);

            if (isSub) {
                await _client.from('subscriptions').delete().eq('subscriber_id', myProfile.id).eq('creator_id', creatorId);
                showToast("구독 취소됨");
            } else {
                await _client.from('subscriptions').insert([{ subscriber_id: myProfile.id, creator_id: creatorId }]);
                showToast("구독 완료! ❤️");
            }
            await loadMySubs();
            openPlayer(currentVideo);
        }

        function closePlayer() { document.getElementById('playerModal').style.display = 'none'; document.getElementById('mainVideo').pause(); }
        
        // 좋아요/댓글 로직은 기존과 동일... (생략)
        init();
    </script>
</body>
</html>
