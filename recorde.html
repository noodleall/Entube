<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Entube - 파일 업로드</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #0f0f0f; color: #f1f1f1; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .upload-container { width: 100%; max-width: 600px; background: #212121; padding: 40px; border-radius: 12px; margin-top: 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .home-btn { color: #3ea6ff; text-decoration: none; font-weight: bold; }
        
        /* 입력창 및 버튼 디자인 */
        input[type="text"] { width: 95%; padding: 15px; margin-bottom: 20px; background: #121212; border: 1px solid #444; color: white; border-radius: 8px; font-size: 16px; outline: none; }
        input[type="file"] { margin-bottom: 20px; color: #aaa; }
        
        /* 영상 미리보기 */
        #preview { width: 100%; border-radius: 8px; background: #000; margin-bottom: 20px; aspect-ratio: 16/9; display: none; object-fit: contain; }
        
        button { width: 100%; padding: 15px; font-size: 16px; font-weight: bold; background: #ff0000; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #cc0000; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #status { margin-top: 20px; text-align: center; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

    <div class="upload-container">
        <div class="header">
            <h2 style="margin:0;">🎬 Entube 영상 업로드</h2>
            <a href="index.html" class="home-btn">← 메인으로</a>
        </div>

        <input type="text" id="videoTitle" placeholder="영상 제목을 입력하세요">
        
        <input type="file" id="videoFile" accept="video/*">
        
        <video id="preview" controls></video>

        <button id="uploadBtn">서버에 업로드 하기</button>
        <p id="status">동영상 파일을 선택하고 업로드 버튼을 눌러주세요.</p>
    </div>

    <script>
        // 🚨 본인의 Supabase 주소와 KEY로 꼭 바꿔주세요!
        const supabaseUrl = 'https://kzchubdwrkcpmuempgrg.supabase.co';
        const supabaseKey = 'sb_publishable_MyFF5Xln3fWLvTqMx2CFNA_obZtoask';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        let currentUser = null;

        // 로그인 안 한 사람은 쫓아내기
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (!session) {
                alert("영상을 올리려면 로그인이 필요합니다!");
                window.location.href = 'index.html'; 
            } else {
                currentUser = session.user;
            }
        });

        const videoFileInput = document.getElementById('videoFile');
        const previewVideo = document.getElementById('preview');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusText = document.getElementById('status');
        const titleInput = document.getElementById('videoTitle');

        let selectedFile = null;

        // 1. 파일을 선택하면 화면에 미리보기 띄워주기
        videoFileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                const fileURL = URL.createObjectURL(file);
                previewVideo.src = fileURL;
                previewVideo.style.display = 'block'; // 숨겨놨던 비디오 태그 보여주기
                statusText.innerText = "파일이 선택되었습니다. 제목을 적고 업로드해주세요.";
            }
        });

        // 2. 업로드 버튼 눌렀을 때 실행되는 기능
        uploadBtn.onclick = async () => {
            const title = titleInput.value.trim();

            if (!title) return alert("영상 제목을 입력해주세요!");
            if (!selectedFile) return alert("업로드할 동영상 파일을 선택해주세요!");

            // 업로드 중일 때 버튼 막기
            uploadBtn.disabled = true;
            videoFileInput.disabled = true;
            titleInput.disabled = true;
            statusText.innerText = "⏳ 영상을 서버로 전송하고 있습니다. 창을 닫지 마세요...";
            statusText.style.color = "#3ea6ff";

            try {
                // 한글 파일명 오류를 막기 위해 파일 이름을 '유저ID_현재시간.확장자'로 변경
                const fileExtension = selectedFile.name.split('.').pop();
                const safeFileName = `${currentUser.id}_${Date.now()}.${fileExtension}`;

                // [수퍼베이스 스토리지에 파일 올리기]
                const { error: storageError } = await supabase.storage
                    .from('videos')
                    .upload(safeFileName, selectedFile, { 
                        cacheControl: '3600',
                        upsert: false 
                    });

                if (storageError) throw storageError;

                // [올라간 파일의 인터넷 주소(URL) 가져오기]
                const { data: publicUrlData } = supabase.storage
                    .from('videos')
                    .getPublicUrl(safeFileName);
                
                // [수퍼베이스 데이터베이스(posts)에 제목과 URL 저장하기]
                const { error: dbError } = await supabase.from('posts').insert([
                    { 
                        title: title, 
                        video_url: publicUrlData.publicUrl, 
                        author_id: currentUser.id 
                    }
                ]);

                if (dbError) throw dbError;

                // 성공 처리
                statusText.innerText = "✅ 업로드 성공! 2초 뒤 메인 화면으로 이동합니다.";
                statusText.style.color = "#00e676";
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);

            } catch (error) {
                console.error(error);
                statusText.innerText = "❌ 업로드 실패: " + error.message;
                statusText.style.color = "#ff4a4a";
                
                // 실패하면 다시 시도할 수 있게 버튼 켜주기
                uploadBtn.disabled = false;
                videoFileInput.disabled = false;
                titleInput.disabled = false;
            }
        };
    </script>
</body>
</html>
